          - python -c "import MaterialX.PyMaterialXGenGlsl as gg, MaterialX.PyMaterialXGenMsl as gm, MaterialX.PyMaterialXGenOsl as go, MaterialX.PyMaterialXGenMdl as gd, MaterialX.PyMaterialXGenSlang as gs; generators = (gg.GlslShaderGenerator.create(), gm.MslShaderGenerator.create(), go.OslShaderGenerator.create(), gd.MdlShaderGenerator.create(), gs.SlangShaderGenerator.create()); assert all(generators); assert [g.getTarget() for g in generators] == ['genglsl', 'genmsl', 'genosl', 'genmdl', 'genslang']"
          - python -c "import importlib.util; modules = ('MaterialX.PyMaterialXRender', 'MaterialX.PyMaterialXRenderGlsl', 'MaterialX.PyMaterialXRenderMsl', 'MaterialX.PyMaterialXRenderOsl', 'MaterialX.PyMaterialXRenderSlang'); found = [module for module in modules if importlib.util.find_spec(module) is not None]; assert not found, found"
        requirements:
          run:
            - python

