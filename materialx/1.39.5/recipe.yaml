context:
  version: "1.39.5"
  build_number: 0
  slang_rhi_rev: d1ae6a9d78830922431983247308b102f0448124

recipe:
  name: materialx
  version: ${{ version }}

source:
  - git: https://github.com/AcademySoftwareFoundation/MaterialX.git
    rev: 7b64921ef1d42f2d57871e9d2c43dc11f041f26b
    submodules: true
    patches:
      - patches/fix-render-slang-gcc15.patch
  - git: https://github.com/shader-slang/slang-rhi.git
    rev: ${{ slang_rhi_rev }}
    target_directory: slang-rhi

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: materialx-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=ON \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_GEN_SLANG=ON \
              -DMATERIALX_BUILD_RENDER=OFF \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=ON \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_CONFIG_FILE="$PREFIX/lib/cmake/MaterialX/MaterialXConfig.cmake" \
              -P "$recipe_dir/cmake/remove-unused-x11-dependency.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=ON ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_GEN_SLANG=ON ^
              -DMATERIALX_BUILD_RENDER=OFF ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=ON ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build ^
              -S .

            cmake --build %SRC_DIR%\..\build --target install --config Release

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_CONFIG_FILE="%LIBRARY_LIB%\cmake\MaterialX\MaterialXConfig.cmake" ^
              -P "%RECIPE_DIR_VAR%\cmake\remove-unused-x11-dependency.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja

  - staging:
      name: materialx-python-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-python

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=ON \
              -DMATERIALX_PYTHON_VERSION=${{ python }} \
              -DMATERIALX_PYTHON_EXECUTABLE=$PYTHON \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=ON \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_GEN_SLANG=ON \
              -DMATERIALX_BUILD_RENDER=OFF \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_PYTHON=ON \
              -DMATERIALX_INSTALL_RESOURCES=ON \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-python \
              -S .

            cmake --build $SRC_DIR/../build-python --target install

            if [ -d "$PREFIX/python/MaterialX" ]; then
              rm -rf "$PREFIX/python/MaterialX/_scripts"
              mkdir -p "$SP_DIR"
              rm -rf "$SP_DIR/MaterialX"
              mv "$PREFIX/python/MaterialX" "$SP_DIR/MaterialX"
              rm -rf "$PREFIX/python"
            fi
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-python

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=ON ^
              -DMATERIALX_PYTHON_VERSION=${{ python }} ^
              -DMATERIALX_PYTHON_EXECUTABLE=%PYTHON% ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=ON ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_GEN_SLANG=ON ^
              -DMATERIALX_BUILD_RENDER=OFF ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_PYTHON=ON ^
              -DMATERIALX_INSTALL_RESOURCES=ON ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-python ^
              -S .

            cmake --build %SRC_DIR%\..\build-python --target install --config Release

            if exist "%LIBRARY_PREFIX%\python\MaterialX" (
              if exist "%LIBRARY_PREFIX%\python\MaterialX\_scripts" rmdir /S /Q "%LIBRARY_PREFIX%\python\MaterialX\_scripts"
              if not exist "%SP_DIR%" mkdir "%SP_DIR%"
              if exist "%SP_DIR%\MaterialX" rmdir /S /Q "%SP_DIR%\MaterialX"
              move "%LIBRARY_PREFIX%\python\MaterialX" "%SP_DIR%\MaterialX"
              rmdir /S /Q "%LIBRARY_PREFIX%\python"
            )
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - python
        - pip
        - pybind11
        - setuptools
        - wheel


  - staging:
      name: materialx-render-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-render

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=OFF \
              -DMATERIALX_BUILD_GEN_MDL=OFF \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_GEN_SLANG=OFF \
              -DMATERIALX_BUILD_RENDER=ON \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=ON \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-render \
              -S .

            cmake --build $SRC_DIR/../build-render --target install

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_CONFIG_DIR="$PREFIX/lib/cmake/MaterialX" \
              -DMATERIALX_OPTIONAL_TARGET_SET=render \
              -P "$recipe_dir/cmake/write-optional-targets.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-render

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=OFF ^
              -DMATERIALX_BUILD_GEN_MDL=OFF ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_GEN_SLANG=OFF ^
              -DMATERIALX_BUILD_RENDER=ON ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=ON ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-render ^
              -S .

            cmake --build %SRC_DIR%\..\build-render --target install --config Release

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_CONFIG_DIR="%LIBRARY_LIB%\cmake\MaterialX" ^
              -DMATERIALX_OPTIONAL_TARGET_SET=render ^
              -P "%RECIPE_DIR_VAR%\cmake\write-optional-targets.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - if: linux
          then: libgl-devel
        - if: linux
          then: xorg-libx11
        - if: linux
          then: xorg-libxt
        - if: linux
          then: xorg-xorgproto

  - staging:
      name: materialx-render-osl-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-render-osl

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=OFF \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_GEN_SLANG=OFF \
              -DMATERIALX_BUILD_RENDER=ON \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON \
              -DMATERIALX_BUILD_OSOS=ON \
              -DMATERIALX_OSL_BINARY_OSLC="$PREFIX/bin/oslc" \
              -DMATERIALX_OSL_INCLUDE_PATH="$PREFIX/include" \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=OFF \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-render-osl \
              -S .

            cmake --build $SRC_DIR/../build-render-osl --target install

            export LD_LIBRARY_PATH="$PREFIX/lib:${LD_LIBRARY_PATH:-}"
            cmake -E make_directory "$PREFIX/libraries/targets/genoslnetwork/osos"
            cmake -E make_directory "$PREFIX/libraries/targets/genoslnetwork"
            "$PREFIX/bin/MaterialXGenOsl_LibsToOso" \
              --path "$PREFIX" \
              --outputOsoPath "$PREFIX/libraries/targets/genoslnetwork/osos" \
              --outputMtlxPath "$PREFIX/libraries/targets/genoslnetwork" \
              --oslCompilerPath "$PREFIX/bin/oslc" \
              --oslIncludePath "$PREFIX/include" \
              --libraryRelativeOsoPath libraries/targets/genoslnetwork/osos

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_CONFIG_DIR="$PREFIX/lib/cmake/MaterialX" \
              -DMATERIALX_OPTIONAL_TARGET_SET=render-osl \
              -P "$recipe_dir/cmake/write-optional-targets.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-render-osl

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=OFF ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_GEN_SLANG=OFF ^
              -DMATERIALX_BUILD_RENDER=ON ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON ^
              -DMATERIALX_BUILD_OSOS=ON ^
              -DMATERIALX_OSL_BINARY_OSLC="%LIBRARY_BIN%\oslc.exe" ^
              -DMATERIALX_OSL_INCLUDE_PATH="%LIBRARY_INC%" ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=OFF ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-render-osl ^
              -S .

            cmake --build %SRC_DIR%\..\build-render-osl --target install --config Release

            set "PATH=%LIBRARY_BIN%;%PATH%"
            cmake -E make_directory "%LIBRARY_PREFIX%\libraries\targets\genoslnetwork\osos"
            cmake -E make_directory "%LIBRARY_PREFIX%\libraries\targets\genoslnetwork"
            "%LIBRARY_BIN%\MaterialXGenOsl_LibsToOso.exe" ^
              --path "%LIBRARY_PREFIX%" ^
              --outputOsoPath "%LIBRARY_PREFIX%\libraries\targets\genoslnetwork\osos" ^
              --outputMtlxPath "%LIBRARY_PREFIX%\libraries\targets\genoslnetwork" ^
              --oslCompilerPath "%LIBRARY_BIN%\oslc.exe" ^
              --oslIncludePath "%LIBRARY_INC%" ^
              --libraryRelativeOsoPath libraries/targets/genoslnetwork/osos

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_CONFIG_DIR="%LIBRARY_LIB%\cmake\MaterialX" ^
              -DMATERIALX_OPTIONAL_TARGET_SET=render-osl ^
              -P "%RECIPE_DIR_VAR%\cmake\write-optional-targets.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - openshadinglanguage-dev 1.15.*
        - openimageio-dev 3.1.*
        - if: linux
          then: libgl-devel
        - if: linux
          then: xorg-libx11
        - if: linux
          then: xorg-libxt
        - if: linux
          then: xorg-xorgproto

  - staging:
      name: materialx-render-slang-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-render-slang
            export CXXFLAGS="${CXXFLAGS:-} -Wno-error=shadow"

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=OFF \
              -DMATERIALX_BUILD_GEN_MDL=OFF \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_GEN_SLANG=ON \
              -DMATERIALX_BUILD_RENDER=ON \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON \
              -DMATERIALX_SLANG_RHI_SOURCE_DIR="$SRC_DIR/slang-rhi" \
              -DSLANG_RHI_FETCH_SLANG=OFF \
              -DSLANG_RHI_SLANG_INCLUDE_DIR="$PREFIX/include" \
              -DSLANG_RHI_SLANG_BINARY_DIR="$PREFIX" \
              -DSLANG_RHI_BUILD_SHARED=OFF \
              -DSLANG_RHI_BUILD_TESTS=OFF \
              -DSLANG_RHI_BUILD_TESTS_WITH_GLFW=OFF \
              -DSLANG_RHI_BUILD_EXAMPLES=OFF \
              -DSLANG_RHI_ENABLE_D3D11=OFF \
              -DSLANG_RHI_ENABLE_D3D12=OFF \
              -DSLANG_RHI_ENABLE_VULKAN=OFF \
              -DSLANG_RHI_ENABLE_METAL=OFF \
              -DSLANG_RHI_ENABLE_CUDA=OFF \
              -DSLANG_RHI_ENABLE_OPTIX=OFF \
              -DSLANG_RHI_ENABLE_WGPU=OFF \
              -DSLANG_RHI_ENABLE_AFTERMATH=OFF \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=OFF \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-render-slang \
              -S .

            cmake --build $SRC_DIR/../build-render-slang --target install

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_BUILD_DIR="$SRC_DIR/../build-render-slang" \
              -DMATERIALX_SOURCE_DIR="$SRC_DIR" \
              -DMATERIALX_INSTALL_PREFIX="$PREFIX" \
              -P "$recipe_dir/cmake/install-render-slang.cmake"
            cmake \
              -DMATERIALX_CONFIG_DIR="$PREFIX/lib/cmake/MaterialX" \
              -DMATERIALX_OPTIONAL_TARGET_SET=render-slang \
              -P "$recipe_dir/cmake/write-optional-targets.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-render-slang

            set "SLANG_RHI_SOURCE_DIR=%SRC_DIR%\slang-rhi"
            set "SLANG_RHI_SOURCE_DIR=%SLANG_RHI_SOURCE_DIR:\=/%"
            set "SLANG_INCLUDE_DIR=%LIBRARY_INC%"
            set "SLANG_INCLUDE_DIR=%SLANG_INCLUDE_DIR:\=/%"
            set "SLANG_BINARY_DIR=%LIBRARY_PREFIX%"
            set "SLANG_BINARY_DIR=%SLANG_BINARY_DIR:\=/%"

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=OFF ^
              -DMATERIALX_BUILD_GEN_MDL=OFF ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_GEN_SLANG=ON ^
              -DMATERIALX_BUILD_RENDER=ON ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON ^
              -DMATERIALX_SLANG_RHI_SOURCE_DIR="%SLANG_RHI_SOURCE_DIR%" ^
              -DSLANG_RHI_FETCH_SLANG=OFF ^
              -DSLANG_RHI_SLANG_INCLUDE_DIR="%SLANG_INCLUDE_DIR%" ^
              -DSLANG_RHI_SLANG_BINARY_DIR="%SLANG_BINARY_DIR%" ^
              -DSLANG_RHI_BUILD_SHARED=OFF ^
              -DSLANG_RHI_BUILD_TESTS=OFF ^
              -DSLANG_RHI_BUILD_TESTS_WITH_GLFW=OFF ^
              -DSLANG_RHI_BUILD_EXAMPLES=OFF ^
              -DSLANG_RHI_ENABLE_D3D11=OFF ^
              -DSLANG_RHI_ENABLE_D3D12=OFF ^
              -DSLANG_RHI_ENABLE_VULKAN=OFF ^
              -DSLANG_RHI_ENABLE_METAL=OFF ^
              -DSLANG_RHI_ENABLE_CUDA=OFF ^
              -DSLANG_RHI_ENABLE_OPTIX=OFF ^
              -DSLANG_RHI_ENABLE_WGPU=OFF ^
              -DSLANG_RHI_ENABLE_AFTERMATH=OFF ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=OFF ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-render-slang ^
              -S .
            if errorlevel 1 exit /b 1

            cmake --build %SRC_DIR%\..\build-render-slang --target install --config Release
            if errorlevel 1 exit /b 1

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_BUILD_DIR="%SRC_DIR%\..\build-render-slang" ^
              -DMATERIALX_SOURCE_DIR="%SRC_DIR%" ^
