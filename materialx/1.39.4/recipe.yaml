              - if not exist "%LIBRARY_BIN%\MaterialXView.exe" exit /b 1
              - if not exist "%LIBRARY_BIN%\MaterialXGraphEditor.exe" exit /b 1
              - '"%LIBRARY_BIN%\MaterialXView.exe" --help'
              - '"%LIBRARY_BIN%\MaterialXGraphEditor.exe" --help'

  - package:
      name: materialx-python
    inherit: materialx-python-build
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - lib/python*/site-packages/MaterialX/**
        - lib/python*/site-packages/MaterialX-*.dist-info/**
        - lib/python*/site-packages/MaterialX-*.egg-info/**
        - Lib/site-packages/MaterialX/**
        - Lib/site-packages/MaterialX-*.dist-info/**
        - Lib/site-packages/MaterialX-*.egg-info/**
    requirements:
      run:
        - python
        - ${{ pin_subpackage('materialx-lib', exact=True) }}
    tests:
      - python:
          imports:
            - MaterialX
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/libraries/stdlib/stdlib_defs.mtlx"
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\libraries\stdlib\stdlib_defs.mtlx" exit /b 1
          - python -c "import MaterialX as mx, os; from pathlib import Path; prefix = Path(os.environ.get('LIBRARY_PREFIX') or os.environ['PREFIX']); doc = mx.createDocument(); loaded = mx.loadLibraries([str(prefix / 'libraries')], mx.FileSearchPath(str(prefix)), doc); assert mx.getVersionString() == '${{ version }}'; assert loaded; assert doc.getNodeDefs()"
          - python -c "import MaterialX.PyMaterialXGenGlsl as gg, MaterialX.PyMaterialXGenMsl as gm, MaterialX.PyMaterialXGenOsl as go, MaterialX.PyMaterialXGenMdl as gd; generators = (gg.GlslShaderGenerator.create(), gm.MslShaderGenerator.create(), go.OslShaderGenerator.create(), gd.MdlShaderGenerator.create()); assert all(generators); assert [g.getTarget() for g in generators] == ['genglsl', 'genmsl', 'genosl', 'genmdl']"
          - python -c "import importlib.util; modules = ('MaterialX.PyMaterialXRender', 'MaterialX.PyMaterialXRenderGlsl', 'MaterialX.PyMaterialXRenderMsl', 'MaterialX.PyMaterialXRenderOsl'); found = [module for module in modules if importlib.util.find_spec(module) is not None]; assert not found, found"
          - python -c "import MaterialX, pathlib; assert not (pathlib.Path(MaterialX.__file__).parent / '_scripts').exists()"
        requirements:
          run:
            - python

  - package:
      name: materialx
    requirements:
      run:
        - ${{ pin_subpackage('materialx-lib', exact=True) }}
        - ${{ pin_subpackage('materialx-dev', exact=True) }}
        - materialx-python ==${{ version }}
      run_exports:
        weak:
          - ${{ pin_subpackage('materialx-lib', upper_bound='x.x') }}
    tests:
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/MaterialX/MaterialXConfig.cmake"
              - cmake -DMATERIALX_CONFIG_FILE="$PREFIX/lib/cmake/MaterialX/MaterialXConfig.cmake" -P tests/check-no-x11-dependency.cmake
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/materialx_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\MaterialX\MaterialXConfig.cmake" exit /b 1
              - cmake -DMATERIALX_CONFIG_FILE="%LIBRARY_LIB%\cmake\MaterialX\MaterialXConfig.cmake" -P tests\check-no-x11-dependency.cmake
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\materialx_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/check-no-x11-dependency.cmake
            - tests/materialx_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/libraries/stdlib/stdlib_defs.mtlx"
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\libraries\stdlib\stdlib_defs.mtlx" exit /b 1
          - python -c "import MaterialX as mx, os; from pathlib import Path; prefix = Path(os.environ.get('LIBRARY_PREFIX') or os.environ['PREFIX']); doc = mx.createDocument(); loaded = mx.loadLibraries([str(prefix / 'libraries')], mx.FileSearchPath(str(prefix)), doc); assert mx.getVersionString() == '${{ version }}'; assert loaded; assert doc.getNodeDefs()"
          - python -c "import MaterialX.PyMaterialXGenGlsl as gg, MaterialX.PyMaterialXGenMsl as gm, MaterialX.PyMaterialXGenOsl as go, MaterialX.PyMaterialXGenMdl as gd; generators = (gg.GlslShaderGenerator.create(), gm.MslShaderGenerator.create(), go.OslShaderGenerator.create(), gd.MdlShaderGenerator.create()); assert all(generators); assert [g.getTarget() for g in generators] == ['genglsl', 'genmsl', 'genosl', 'genmdl']"
          - python -c "import importlib.util; modules = ('MaterialX.PyMaterialXRender', 'MaterialX.PyMaterialXRenderGlsl', 'MaterialX.PyMaterialXRenderMsl', 'MaterialX.PyMaterialXRenderOsl'); found = [module for module in modules if importlib.util.find_spec(module) is not None]; assert not found, found"
        requirements:
