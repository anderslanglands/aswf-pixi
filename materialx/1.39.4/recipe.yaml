context:
  version: "1.39.4"
  build_number: 0

recipe:
  name: materialx
  version: ${{ version }}

source:
  git: https://github.com/AcademySoftwareFoundation/MaterialX.git
  rev: 270b5cf2ae2be24a3b6ef4b0569f1c93038dda1d
  submodules: true

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: materialx-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=ON \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_RENDER=OFF \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=ON \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_CONFIG_FILE="$PREFIX/lib/cmake/MaterialX/MaterialXConfig.cmake" \
              -P "$recipe_dir/cmake/remove-unused-x11-dependency.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=ON ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_RENDER=OFF ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=ON ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build ^
              -S .

            cmake --build %SRC_DIR%\..\build --target install --config Release

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_CONFIG_FILE="%LIBRARY_LIB%\cmake\MaterialX\MaterialXConfig.cmake" ^
              -P "%RECIPE_DIR_VAR%\cmake\remove-unused-x11-dependency.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja

  - staging:
      name: materialx-python-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-python

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=ON \
              -DMATERIALX_PYTHON_VERSION=${{ python }} \
              -DMATERIALX_PYTHON_EXECUTABLE=$PYTHON \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=ON \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_RENDER=OFF \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_PYTHON=ON \
              -DMATERIALX_INSTALL_RESOURCES=ON \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-python \
              -S .

            cmake --build $SRC_DIR/../build-python --target install

            if [ -d "$PREFIX/python/MaterialX" ]; then
              rm -rf "$PREFIX/python/MaterialX/_scripts"
              mkdir -p "$SP_DIR"
              rm -rf "$SP_DIR/MaterialX"
              mv "$PREFIX/python/MaterialX" "$SP_DIR/MaterialX"
              rm -rf "$PREFIX/python"
            fi
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-python

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=ON ^
              -DMATERIALX_PYTHON_VERSION=${{ python }} ^
              -DMATERIALX_PYTHON_EXECUTABLE=%PYTHON% ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=ON ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_RENDER=OFF ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=OFF ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_PYTHON=ON ^
              -DMATERIALX_INSTALL_RESOURCES=ON ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-python ^
              -S .

            cmake --build %SRC_DIR%\..\build-python --target install --config Release

            if exist "%LIBRARY_PREFIX%\python\MaterialX" (
              if exist "%LIBRARY_PREFIX%\python\MaterialX\_scripts" rmdir /S /Q "%LIBRARY_PREFIX%\python\MaterialX\_scripts"
              if not exist "%SP_DIR%" mkdir "%SP_DIR%"
              if exist "%SP_DIR%\MaterialX" rmdir /S /Q "%SP_DIR%\MaterialX"
              move "%LIBRARY_PREFIX%\python\MaterialX" "%SP_DIR%\MaterialX"
              rmdir /S /Q "%LIBRARY_PREFIX%\python"
            )
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - python
        - pip
        - pybind11
        - setuptools
        - wheel


  - staging:
      name: materialx-render-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-render

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=OFF \
              -DMATERIALX_BUILD_GEN_MDL=OFF \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_RENDER=ON \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=ON \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-render \
              -S .

            cmake --build $SRC_DIR/../build-render --target install

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_CONFIG_DIR="$PREFIX/lib/cmake/MaterialX" \
              -DMATERIALX_OPTIONAL_TARGET_SET=render \
              -P "$recipe_dir/cmake/write-optional-targets.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-render

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=OFF ^
              -DMATERIALX_BUILD_GEN_MDL=OFF ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_RENDER=ON ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=ON ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-render ^
              -S .

            cmake --build %SRC_DIR%\..\build-render --target install --config Release

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_CONFIG_DIR="%LIBRARY_LIB%\cmake\MaterialX" ^
              -DMATERIALX_OPTIONAL_TARGET_SET=render ^
              -P "%RECIPE_DIR_VAR%\cmake\write-optional-targets.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - if: linux
          then: libgl-devel
        - if: linux
          then: xorg-libx11
        - if: linux
          then: xorg-libxt
        - if: linux
          then: xorg-xorgproto

  - staging:
      name: materialx-render-osl-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-render-osl

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=OFF \
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=OFF \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_RENDER=ON \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON \
              -DMATERIALX_OSL_BINARY_OSLC="$PREFIX/bin/oslc" \
              -DMATERIALX_OSL_INCLUDE_PATH="$PREFIX/include" \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=OFF \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-render-osl \
              -S .

            cmake --build $SRC_DIR/../build-render-osl --target install


            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake \
              -DMATERIALX_CONFIG_DIR="$PREFIX/lib/cmake/MaterialX" \
              -DMATERIALX_OPTIONAL_TARGET_SET=render-osl \
              -P "$recipe_dir/cmake/write-optional-targets.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-render-osl

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=OFF ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=OFF ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=OFF ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_RENDER=ON ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON ^
              -DMATERIALX_OSL_BINARY_OSLC="%LIBRARY_BIN%\oslc.exe" ^
              -DMATERIALX_OSL_INCLUDE_PATH="%LIBRARY_INC%" ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=OFF ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-render-osl ^
              -S .

            cmake --build %SRC_DIR%\..\build-render-osl --target install --config Release


            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake ^
              -DMATERIALX_CONFIG_DIR="%LIBRARY_LIB%\cmake\MaterialX" ^
              -DMATERIALX_OPTIONAL_TARGET_SET=render-osl ^
              -P "%RECIPE_DIR_VAR%\cmake\write-optional-targets.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - openshadinglanguage-dev 1.15.*
        - openimageio-dev 3.1.*
        - if: linux
          then: libgl-devel
        - if: linux
          then: xorg-libx11
        - if: linux
          then: xorg-libxt
        - if: linux
          then: xorg-xorgproto

  - staging:
      name: materialx-guitools-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build-guitools

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DMATERIALX_BUILD_SHARED_LIBS=ON \
              -DMATERIALX_BUILD_PYTHON=OFF \
              -DMATERIALX_BUILD_VIEWER=ON \
              -DMATERIALX_BUILD_GRAPH_EDITOR=ON \
              -DMATERIALX_BUILD_DOCS=OFF \
              -DMATERIALX_BUILD_TESTS=OFF \
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF \
              -DMATERIALX_BUILD_GEN_GLSL=ON \
              -DMATERIALX_BUILD_GEN_OSL=ON \
              -DMATERIALX_BUILD_GEN_MDL=ON \
              -DMATERIALX_BUILD_GEN_MSL=ON \
              -DMATERIALX_BUILD_RENDER=ON \
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON \
              -DMATERIALX_BUILD_OIIO=OFF \
              -DMATERIALX_INSTALL_RESOURCES=OFF \
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF \
              -B $SRC_DIR/../build-guitools \
              -S .

            cmake --build $SRC_DIR/../build-guitools --target install
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-guitools

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DMATERIALX_BUILD_SHARED_LIBS=ON ^
              -DMATERIALX_BUILD_PYTHON=OFF ^
              -DMATERIALX_BUILD_VIEWER=ON ^
              -DMATERIALX_BUILD_GRAPH_EDITOR=ON ^
              -DMATERIALX_BUILD_DOCS=OFF ^
              -DMATERIALX_BUILD_TESTS=OFF ^
              -DMATERIALX_BUILD_BENCHMARK_TESTS=OFF ^
              -DMATERIALX_BUILD_GEN_GLSL=ON ^
              -DMATERIALX_BUILD_GEN_OSL=ON ^
              -DMATERIALX_BUILD_GEN_MDL=ON ^
              -DMATERIALX_BUILD_GEN_MSL=ON ^
              -DMATERIALX_BUILD_RENDER=ON ^
              -DMATERIALX_BUILD_RENDER_PLATFORMS=ON ^
              -DMATERIALX_BUILD_OIIO=OFF ^
              -DMATERIALX_INSTALL_RESOURCES=OFF ^
              -DMATERIALX_WARNINGS_AS_ERRORS=OFF ^
              -B %SRC_DIR%\..\build-guitools ^
              -S .

            cmake --build %SRC_DIR%\..\build-guitools --target install --config Release
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - if: linux
          then: libgl-devel
        - if: linux
          then: xorg-libx11
        - if: linux
          then: xorg-libxt
        - if: linux
          then: xorg-libxcursor
        - if: linux
          then: xorg-libxext
        - if: linux
          then: xorg-libxi
        - if: linux
          then: xorg-libxinerama
        - if: linux
          then: xorg-libxrandr
        - if: linux
          then: xorg-libxxf86vm
        - if: linux
          then: xorg-xorgproto

  - package:
      name: materialx-lib
    inherit: materialx-build
    build:
      files:
        - lib/libMaterialX*.so*
        - lib/libMaterialX*.dylib*
        - Library/bin/MaterialX*.dll
        - libraries/**
        - resources/**
        - Library/libraries/**
        - Library/resources/**
    requirements:
      run_exports:
        weak:
          - ${{ pin_subpackage('materialx-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/MaterialXCore/Document.h
              - lib/cmake/MaterialX/MaterialXConfig.cmake
              - lib/libMaterialXRender.so
              - lib/libMaterialXRenderGlsl.so
              - lib/libMaterialXRenderHw.so
              - lib/libMaterialXRender.dylib
              - lib/libMaterialXRenderGlsl.dylib
              - lib/libMaterialXRenderHw.dylib
              - Library/include/MaterialXCore/Document.h
              - Library/lib/cmake/MaterialX/MaterialXConfig.cmake
              - Library/bin/MaterialXRender.dll
              - Library/bin/MaterialXRenderGlsl.dll
              - Library/bin/MaterialXRenderHw.dll
      - script:
          - if: linux
            then:
              - test -f "$PREFIX/libraries/stdlib/stdlib_defs.mtlx"
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libMaterialXCore.so*')); assert paths; ctypes.CDLL(paths[0])"
          - if: osx
            then:
              - test -f "$PREFIX/libraries/stdlib/stdlib_defs.mtlx"
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libMaterialXCore*.dylib*')); assert paths; ctypes.CDLL(paths[0])"
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\libraries\stdlib\stdlib_defs.mtlx" exit /b 1
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['LIBRARY_BIN'], 'MaterialXCore*.dll')); assert paths; ctypes.WinDLL(paths[0])"
        requirements:
          run:
            - python

  - package:
      name: materialx-dev
    inherit: materialx-build
    build:
      files:
        - include/MaterialX*/**
        - lib/cmake/MaterialX/**
        - Library/include/MaterialX*/**
        - Library/lib/cmake/MaterialX/**
        - Library/lib/MaterialX*.lib
    requirements:
      run:
        - ${{ pin_subpackage('materialx-lib', exact=True) }}
      run_exports:
        weak:
          - ${{ pin_subpackage('materialx-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - MaterialXCore/Document.h
            - MaterialXCore/Util.h
            - MaterialXGenOsl/OslShaderGenerator.h
            - MaterialXGenMdl/MdlShaderGenerator.h
          files:
            not_exists:
              - include/MaterialXRender/TextureBaker.h
              - include/MaterialXRenderGlsl/GlslRenderer.h
              - include/MaterialXRenderHw/HwRenderer.h
              - Library/include/MaterialXRender/TextureBaker.h
              - Library/include/MaterialXRenderGlsl/GlslRenderer.h
              - Library/include/MaterialXRenderHw/HwRenderer.h
              - Library/lib/MaterialXRender.lib
              - Library/lib/MaterialXRenderGlsl.lib
              - Library/lib/MaterialXRenderHw.lib
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/MaterialX/MaterialXConfig.cmake"
              - cmake -DMATERIALX_CONFIG_FILE="$PREFIX/lib/cmake/MaterialX/MaterialXConfig.cmake" -P tests/check-no-x11-dependency.cmake
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/materialx_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\MaterialX\MaterialXConfig.cmake" exit /b 1
              - cmake -DMATERIALX_CONFIG_FILE="%LIBRARY_LIB%\cmake\MaterialX\MaterialXConfig.cmake" -P tests\check-no-x11-dependency.cmake
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\materialx_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/check-no-x11-dependency.cmake
            - tests/materialx_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja


  - package:
      name: materialx-render
    inherit:
      from: materialx-render-build
      run_exports: false
    build:
      files:
        - lib/libMaterialXRender.so*
        - lib/libMaterialXRenderGlsl.so*
        - lib/libMaterialXRenderHw.so*
        - lib/libMaterialXRenderMsl.so*
        - lib/libMaterialXRender*.dylib*
        - include/MaterialXRender/**
        - include/MaterialXRenderGlsl/**
        - include/MaterialXRenderHw/**
        - include/MaterialXRenderMsl/**
        - lib/cmake/MaterialX/MaterialXRenderOptionalTargets.cmake
        - resources/**
        - Library/bin/MaterialXRender.dll
        - Library/bin/MaterialXRenderGlsl.dll
        - Library/bin/MaterialXRenderHw.dll
        - Library/bin/MaterialXRenderMsl.dll
        - Library/include/MaterialXRender/**
        - Library/include/MaterialXRenderGlsl/**
        - Library/include/MaterialXRenderHw/**
        - Library/include/MaterialXRenderMsl/**
        - Library/lib/MaterialXRender.lib
        - Library/lib/MaterialXRenderGlsl.lib
        - Library/lib/MaterialXRenderHw.lib
        - Library/lib/MaterialXRenderMsl.lib
        - Library/lib/cmake/MaterialX/MaterialXRenderOptionalTargets.cmake
        - Library/resources/**
    requirements:
      run:
        - ${{ pin_subpackage('materialx-dev', exact=True) }}
        - if: linux
          then: libgl-devel
        - if: linux
          then: xorg-libx11
        - if: linux
          then: xorg-libxt
        - if: linux
          then: xorg-xorgproto
      run_exports:
        weak:
          - ${{ pin_subpackage('materialx-lib', upper_bound='x.x') }}
          - ${{ pin_subpackage('materialx-render', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - MaterialXRender/Image.h
            - MaterialXRenderGlsl/GlslRenderer.h
          files:
            not_exists:
              - lib/libMaterialXRenderOsl.so
              - lib/libMaterialXRenderOsl.dylib
              - lib/libMaterialXRenderSlang.so
              - lib/libMaterialXRenderSlang.dylib
              - Library/bin/MaterialXRenderOsl.dll
              - Library/bin/MaterialXRenderSlang.dll
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/MaterialX/MaterialXRenderOptionalTargets.cmake"
              - cmake -S tests -B build-render -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build-render --target materialx_render_consumer
              - ./build-render/materialx_render_consumer
          - if: osx
            then:
              - test -f "$PREFIX/include/MaterialXRenderMsl/MslRenderer.h"
              - test -f "$PREFIX/lib/libMaterialXRenderMsl.dylib"
              - cmake --build build-render --target materialx_render_msl_consumer
              - ./build-render/materialx_render_msl_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\MaterialX\MaterialXRenderOptionalTargets.cmake" exit /b 1
              - cmake -S tests -B build-render -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build-render --config Release --target materialx_render_consumer
              - build-render\materialx_render_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/materialx_consumer.cpp
            - tests/materialx_render_consumer.cpp
            - tests/materialx_render_msl_consumer.mm
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
