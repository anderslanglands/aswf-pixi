context:
  version: "3.0.1"
  build_number: 0

recipe:
  name: seexpr
  version: ${{ version }}

source:
  url: https://github.com/wdas/SeExpr/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 1e4cd35e6d63bd3443e1bffe723dbae91334c2c94a84cc590ea8f1886f96f84e
  patches:
    - fix-msvc-log2.patch

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: seexpr-build
    build:
      script:
        - if: unix
          then: |
            set -euo pipefail

            cmake -E rm -rf $SRC_DIR/../build

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DENABLE_LLVM_BACKEND=OFF \
              -DENABLE_SSE4=OFF \
              -DUSE_PYTHON=OFF \
              -DBUILD_UTILS=OFF \
              -DBUILD_DEMOS=OFF \
              -DBUILD_DOC=OFF \
              -DBUILD_TESTS=OFF \
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt5=ON \
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt4=ON \
              -DCMAKE_DISABLE_FIND_PACKAGE_PNG=ON \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install
            cmake -E rm -rf \
              $PREFIX/include/SeExpr2/UI \
              $PREFIX/lib/libSeExpr2Editor*
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build
            if errorlevel 1 exit /b 1

            if not exist "%SRC_DIR%\src\SeExpr2\generated" mkdir "%SRC_DIR%\src\SeExpr2\generated"
            pushd "%SRC_DIR%\src\SeExpr2"
            win_flex -oExprParserLexIn.cpp ExprParserLex.l
            if errorlevel 1 exit /b 1
            win_bison --defines --verbose --fixed-output-files -p SeExpr2 ExprParser.y
            if errorlevel 1 exit /b 1
            python -c "from pathlib import Path; generated = Path('generated'); text = Path('ExprParserLexIn.cpp').read_text(encoding='utf-8').replace('SeExprwrap(n)', 'SeExprwrap()').replace('yy', 'SeExpr2').replace('YY', 'SeExprYY'); (generated / 'ExprParserLex.cpp').write_text(text, encoding='utf-8'); text = Path('y.tab.h').read_text(encoding='utf-8').replace('yy', 'SeExpr2').replace('YY', 'SeExprYY'); (generated / 'ExprParser.tab.h').write_text(text, encoding='utf-8'); text = Path('y.tab.c').read_text(encoding='utf-8').replace('yy', 'SeExpr2').replace('YY', 'SeExprYY'); (generated / 'ExprParser.cpp').write_text(text, encoding='utf-8')"
            if errorlevel 1 exit /b 1
            if exist ExprParserLexIn.cpp del /Q ExprParserLexIn.cpp
            if exist y.tab.c del /Q y.tab.c
            if exist y.tab.h del /Q y.tab.h
            if exist y.output del /Q y.output
            popd

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DENABLE_LLVM_BACKEND=OFF ^
              -DENABLE_SSE4=OFF ^
              -DUSE_PYTHON=OFF ^
              -DBUILD_UTILS=OFF ^
              -DBUILD_DEMOS=OFF ^
              -DBUILD_DOC=OFF ^
              -DBUILD_TESTS=OFF ^
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt5=ON ^
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt4=ON ^
              -DCMAKE_DISABLE_FIND_PACKAGE_PNG=ON ^
              -B %SRC_DIR%\..\build ^
              -S .
            if errorlevel 1 exit /b 1

            cmake --build %SRC_DIR%\..\build --target install --config Release
            if errorlevel 1 exit /b 1
            if exist "%LIBRARY_INC%\SeExpr2\UI" rmdir /S /Q "%LIBRARY_INC%\SeExpr2\UI"
            if exist "%LIBRARY_LIB%\SeExpr2Editor.lib" del /Q "%LIBRARY_LIB%\SeExpr2Editor.lib"
            if exist "%LIBRARY_BIN%\SeExpr2Editor.dll" del /Q "%LIBRARY_BIN%\SeExpr2Editor.dll"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - if: unix
          then: bison
        - if: unix
          then: flex
        - if: unix
          then: sed
        - if: win
          then: python
        - if: win
          then: winflexbison

  - staging:
      name: seexpr-tools-build
    build:
      script:
        - if: unix
          then: |
            set -euo pipefail

            cmake -E rm -rf $SRC_DIR/../build-tools

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DENABLE_LLVM_BACKEND=OFF \
              -DENABLE_SSE4=OFF \
              -DUSE_PYTHON=OFF \
              -DBUILD_UTILS=ON \
              -DBUILD_DEMOS=OFF \
              -DBUILD_DOC=OFF \
              -DBUILD_TESTS=OFF \
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt5=ON \
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt4=ON \
              -DCMAKE_DISABLE_FIND_PACKAGE_PNG=ON \
              -B $SRC_DIR/../build-tools \
              -S .

            cmake --build $SRC_DIR/../build-tools --target install
            cmake -E rm -rf \
              $PREFIX/include/SeExpr2/UI \
              $PREFIX/lib/libSeExpr2Editor*
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build-tools
            if errorlevel 1 exit /b 1

            if not exist "%SRC_DIR%\src\SeExpr2\generated" mkdir "%SRC_DIR%\src\SeExpr2\generated"
            pushd "%SRC_DIR%\src\SeExpr2"
            win_flex -oExprParserLexIn.cpp ExprParserLex.l
            if errorlevel 1 exit /b 1
            win_bison --defines --verbose --fixed-output-files -p SeExpr2 ExprParser.y
            if errorlevel 1 exit /b 1
            python -c "from pathlib import Path; generated = Path('generated'); text = Path('ExprParserLexIn.cpp').read_text(encoding='utf-8').replace('SeExprwrap(n)', 'SeExprwrap()').replace('yy', 'SeExpr2').replace('YY', 'SeExprYY'); (generated / 'ExprParserLex.cpp').write_text(text, encoding='utf-8'); text = Path('y.tab.h').read_text(encoding='utf-8').replace('yy', 'SeExpr2').replace('YY', 'SeExprYY'); (generated / 'ExprParser.tab.h').write_text(text, encoding='utf-8'); text = Path('y.tab.c').read_text(encoding='utf-8').replace('yy', 'SeExpr2').replace('YY', 'SeExprYY'); (generated / 'ExprParser.cpp').write_text(text, encoding='utf-8')"
            if errorlevel 1 exit /b 1
            if exist ExprParserLexIn.cpp del /Q ExprParserLexIn.cpp
            if exist y.tab.c del /Q y.tab.c
            if exist y.tab.h del /Q y.tab.h
            if exist y.output del /Q y.output
            popd

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DENABLE_LLVM_BACKEND=OFF ^
              -DENABLE_SSE4=OFF ^
              -DUSE_PYTHON=OFF ^
              -DBUILD_UTILS=ON ^
              -DBUILD_DEMOS=OFF ^
              -DBUILD_DOC=OFF ^
              -DBUILD_TESTS=OFF ^
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt5=ON ^
              -DCMAKE_DISABLE_FIND_PACKAGE_Qt4=ON ^
              -DCMAKE_DISABLE_FIND_PACKAGE_PNG=ON ^
              -B %SRC_DIR%\..\build-tools ^
              -S .
            if errorlevel 1 exit /b 1

            cmake --build %SRC_DIR%\..\build-tools --target install --config Release
            if errorlevel 1 exit /b 1
            if exist "%LIBRARY_INC%\SeExpr2\UI" rmdir /S /Q "%LIBRARY_INC%\SeExpr2\UI"
            if exist "%LIBRARY_LIB%\SeExpr2Editor.lib" del /Q "%LIBRARY_LIB%\SeExpr2Editor.lib"
            if exist "%LIBRARY_BIN%\SeExpr2Editor.dll" del /Q "%LIBRARY_BIN%\SeExpr2Editor.dll"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - if: unix
          then: bison
        - if: unix
          then: flex
        - if: unix
          then: sed
        - if: win
          then: python
        - if: win
          then: winflexbison

  - package:
      name: seexpr-lib
    inherit: seexpr-build
    build:
      files:
        - lib/libSeExpr2.so*
        - lib/libSeExpr2.*dylib*
        - Library/lib/SeExpr2.lib
    requirements:
      run_exports:
        weak:
          - ${{ pin_subpackage('seexpr-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/SeExpr2/Expression.h
              - include/SeExpr2/UI/**
              - lib/libSeExpr2Editor*
              - lib/python*/site-packages/SeExpr*
              - Lib/site-packages/SeExpr*
              - Library/lib/python*/site-packages/SeExpr*
              - share/SeExpr2/demos/**
              - share/cmake/SeExpr2/seexpr2-config.cmake
              - Library/include/SeExpr2/Expression.h
              - Library/include/SeExpr2/UI/**
              - Library/lib/SeExpr2Editor*
              - Library/share/SeExpr2/demos/**
              - Library/share/cmake/SeExpr2/seexpr2-config.cmake
      - script:
          - if: linux
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libSeExpr2.so*')); assert paths; ctypes.CDLL(paths[0])"
          - if: osx
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libSeExpr2*.dylib*')); assert paths; ctypes.CDLL(paths[0])"
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\SeExpr2.lib" exit /b 1
        requirements:
          run:
            - python

  - package:
      name: seexpr-dev
    inherit: seexpr-build
    build:
      files:
        - include/SeExpr2/**
        - share/cmake/SeExpr2/**
        - share/pkgconfig/seexpr2.pc
        - Library/include/SeExpr2/**
        - Library/share/cmake/SeExpr2/**
        - Library/share/pkgconfig/seexpr2.pc
    requirements:
      run:
        - ${{ pin_subpackage('seexpr-lib', exact=True) }}
      run_exports:
        weak:
          - ${{ pin_subpackage('seexpr-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - SeExpr2/Expression.h
            - SeExpr2/ExprFunc.h
          files:
            not_exists:
              - include/SeExpr2/UI/**
              - lib/libSeExpr2Editor*
              - lib/python*/site-packages/SeExpr*
              - Lib/site-packages/SeExpr*
              - Library/lib/python*/site-packages/SeExpr*
              - share/SeExpr2/demos/**
              - Library/include/SeExpr2/UI/**
              - Library/lib/SeExpr2Editor*
              - Library/share/SeExpr2/demos/**
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/share/cmake/SeExpr2/seexpr2-config.cmake"
              - cmake -E rm -rf build
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/seexpr_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\share\cmake\SeExpr2\seexpr2-config.cmake" exit /b 1
              - set "SEEXPR_TEST_BUILD=%TEMP%\seexpr-consumer-%RANDOM%-%RANDOM%"
              - if exist "%SEEXPR_TEST_BUILD%" rmdir /S /Q "%SEEXPR_TEST_BUILD%"
              - if exist "%SEEXPR_TEST_BUILD%" exit /b 1
              - cmake -S tests -B "%SEEXPR_TEST_BUILD%" -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - if errorlevel 1 exit /b 1
              - cmake --build "%SEEXPR_TEST_BUILD%" --config Release
              - if errorlevel 1 exit /b 1
              - '"%SEEXPR_TEST_BUILD%\seexpr_consumer.exe"'
              - if errorlevel 1 exit /b 1
              - rmdir /S /Q "%SEEXPR_TEST_BUILD%"
              - if exist "%SEEXPR_TEST_BUILD%" exit /b 1
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/seexpr_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: seexpr-tools
    inherit: seexpr-tools-build
    build:
      files:
        - share/SeExpr2/utils/eval
        - share/SeExpr2/utils/listVar
        - Library/share/SeExpr2/utils/eval.exe
        - Library/share/SeExpr2/utils/listVar.exe
    requirements:
      run:
        - ${{ pin_subpackage('seexpr-lib', exact=True) }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/SeExpr2/**
              - lib/libSeExpr2Editor*
              - lib/python*/site-packages/SeExpr*
              - Lib/site-packages/SeExpr*
              - Library/lib/python*/site-packages/SeExpr*
              - share/SeExpr2/demos/**
              - Library/include/SeExpr2/**
              - Library/lib/SeExpr2Editor*
              - Library/share/SeExpr2/demos/**
      - script:
          - python tests/check_tools.py
        files:
          recipe:
            - tests/check_tools.py
        requirements:
          run:
            - python

  - package:
      name: seexpr
    requirements:
      run:
        - ${{ pin_subpackage('seexpr-lib', exact=True) }}
        - ${{ pin_subpackage('seexpr-dev', exact=True) }}
      run_exports:
        weak:
          - ${{ pin_subpackage('seexpr-lib', upper_bound='x.x') }}
    tests:
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/share/cmake/SeExpr2/seexpr2-config.cmake"
              - cmake -E rm -rf build
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/seexpr_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\share\cmake\SeExpr2\seexpr2-config.cmake" exit /b 1
              - set "SEEXPR_TEST_BUILD=%TEMP%\seexpr-consumer-%RANDOM%-%RANDOM%"
              - if exist "%SEEXPR_TEST_BUILD%" rmdir /S /Q "%SEEXPR_TEST_BUILD%"
              - if exist "%SEEXPR_TEST_BUILD%" exit /b 1
              - cmake -S tests -B "%SEEXPR_TEST_BUILD%" -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - if errorlevel 1 exit /b 1
              - cmake --build "%SEEXPR_TEST_BUILD%" --config Release
              - if errorlevel 1 exit /b 1
              - '"%SEEXPR_TEST_BUILD%\seexpr_consumer.exe"'
              - if errorlevel 1 exit /b 1
              - rmdir /S /Q "%SEEXPR_TEST_BUILD%"
              - if exist "%SEEXPR_TEST_BUILD%" exit /b 1
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/seexpr_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

about:
  homepage: https://wdas.github.io/SeExpr
  repository: https://github.com/wdas/SeExpr
  license: Apache-2.0
  license_file: LICENSE
  summary: Embeddable expression evaluation engine for graphics applications
