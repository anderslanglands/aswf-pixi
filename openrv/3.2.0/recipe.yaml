context:
  version: "3.2.0"
  build_number: 0

package:
  name: openrv
  version: ${{ version }}

source:
  git: https://github.com/AcademySoftwareFoundation/OpenRV.git
  rev: "24d2a67d894506a7207067e0891194273dbf0d4e"
  submodules: true
  patches:
    - patches/update-cy2026-pins.patch
    - patches/use-external-conda-qt.patch
    - patches/qt610-muqt6-compat.patch
    - patches/qt-tool-conda-layout.patch
    - patches/qt-private-and-opengl-glx-targets.patch
    - patches/disable-missing-ndi-sdk.patch
    - patches/optional-osmesa.patch
    - patches/optional-qtbonjour.patch
    - patches/msvc-mp-compile-options.patch
    - patches/openssl-install-libdir-lib.patch
    - patches/openssl-windows-implib-byproducts.patch
    - patches/standard-lib-windows-implib-byproduct.patch
    - patches/openjph-windows-import-library-name.patch
    - patches/imgui-windows-implib-byproduct.patch
    - patches/ocio-windows-implib-byproduct.patch
    - patches/aja-macos-sdk-version.patch
    - patches/tiff-windows-implib-byproduct.patch
    - patches/tex-windows-no-unistd.patch
    - patches/rvprof-windows-glu-apientry.patch
    - patches/glew-build-python.patch
    - patches/quote-file-python3-executable.patch
    - patches/minizip-gcc15-pointer-types.patch
    - patches/python-zlib-build-paths.patch
    - patches/python-detect-openssl-libdir.patch
    - patches/python-zlib-runtime-paths.patch
    - patches/python-darwin-zlib-runshared.patch
    - patches/python-disable-macos-pgo.patch
    - patches/cmake-build-python-executable.patch
    - patches/python-pip-index-env.patch
    - patches/pyside-use-system-7zip.patch
    - patches/pyside6-windows-short-build-paths.patch
    - patches/pyside6-linux-shiboken-sysroot-includes.patch
    - patches/py-interp-windows-qt-plugin-path.patch
    - patches/signalspy-qt6-msvc-access.patch
    - patches/python-avoid-pip-self-install.patch
    - patches/python-wheel-safe-runtime-deps.patch
    - patches/python-pydantic-py313.patch
    - patches/python-validation-no-network-wheel-install.patch
    - patches/python-validation-no-tkinter.patch
    - patches/ffmpeg-serial-build-and-toolchain.patch
    - patches/boost-conda-toolchain.patch
    - patches/use-external-conda-yaml-cpp.patch
    - patches/ocio-windows-short-ext-build-paths.patch
    - patches/oiio-windows-short-local-deps.patch
    - patches/ftgl-gcc15-fpermissive.patch
    - patches/nedmalloc-gnu-source.patch
    - patches/honor-build-testing.patch
    - patches/audio-gc-build-order.patch
    - patches/suppress-stale-nv-glx-warning.patch

build:
  number: ${{ build_number }}
  skip:
    - target_platform == "osx-64"
  script:
    - if: unix
      then: |
        cmake -E rm -rf "$SRC_DIR/../build"

        qt_root="$PREFIX"
        openrv_prefix="$PREFIX/opt/openrv"
        qtpaths_symlink=""
        cmake_osx_architectures_args=()

        if [ "$(uname -s)" = "Darwin" ]; then
          cmake_osx_architectures_args=(-DCMAKE_OSX_ARCHITECTURES="$(uname -m)")
        fi

        if [ ! -e "$PREFIX/bin/qtpaths" ]; then
          for qtpaths_candidate in \
            "$PREFIX/lib/qt6/bin/qtpaths" \
            "$PREFIX/lib/qt6/bin/qtpaths6"; do
            if [ -x "$qtpaths_candidate" ]; then
              mkdir -p "$PREFIX/bin"
              ln -s "$qtpaths_candidate" "$PREFIX/bin/qtpaths"
              qtpaths_symlink="$PREFIX/bin/qtpaths"
              break
            fi
          done
        fi

        cleanup_qtpaths_symlink() {
          if [ -n "$qtpaths_symlink" ]; then
            rm -f "$qtpaths_symlink"
          fi
        }
        trap cleanup_qtpaths_symlink EXIT

        export QT_PLUGIN_PATH="$PREFIX/lib/qt6/plugins${QT_PLUGIN_PATH:+:$QT_PLUGIN_PATH}"
        export QT_QPA_PLATFORM_PLUGIN_PATH="$PREFIX/lib/qt6/plugins/platforms${QT_QPA_PLATFORM_PLUGIN_PATH:+:$QT_QPA_PLATFORM_PLUGIN_PATH}"
        export QML2_IMPORT_PATH="$PREFIX/lib/qt6/qml${QML2_IMPORT_PATH:+:$QML2_IMPORT_PATH}"

        python - <<'PY'
        from pathlib import Path

        path = Path("src/build/make_pyside6.py")
        text = path.read_text()
        old = '    os.rename(cmakelist_path, old_cmakelist_path)\n    with open(old_cmakelist_path) as old_cmakelist:\n        with open(cmakelist_path, "w") as cmakelist:\n            for line in old_cmakelist:\n                new_line = line.replace(\n                    " set(HAS_LIBXSLT 1)",\n                    " #set(HAS_LIBXSLT 1)",\n                )\n\n                cmakelist.write(new_line)\n'
        new = '    os.rename(cmakelist_path, old_cmakelist_path)\n    with open(old_cmakelist_path) as old_cmakelist:\n        with open(cmakelist_path, "w") as cmakelist:\n            for line in old_cmakelist:\n                new_line = line.replace(\n                    " set(HAS_LIBXSLT 1)",\n                    " #set(HAS_LIBXSLT 1)",\n                )\n\n                cmakelist.write(new_line)\n\n    if platform.system() == "Linux":\n        linux_packaging_path = os.path.join(SOURCE_DIR, "build_scripts", "platforms", "linux.py")\n        with open(linux_packaging_path) as linux_packaging_file:\n            linux_packaging = linux_packaging_file.read()\n\n        old_linux_packaging = """            copydir("{install_dir}/plugins/designer",\n                    plugins_target / "designer",\n                    _filter=["*.so"],\n                    recursive=False,\n                    _vars=_vars)"""\n        new_linux_packaging = """            copydir("{install_dir}/plugins/designer",\n                    plugins_target / "designer",\n                    _filter=["*.so"],\n                    recursive=False,\n                    force=False,\n                    _vars=_vars)"""\n        if old_linux_packaging in linux_packaging and new_linux_packaging not in linux_packaging:\n            linux_packaging = linux_packaging.replace(old_linux_packaging, new_linux_packaging)\n            with open(linux_packaging_path, "w") as linux_packaging_file:\n                linux_packaging_file.write(linux_packaging)\n'
        if old not in text and new not in text:
            raise SystemExit("Could not find PySide prepare patch anchor")
        if new not in text:
            path.write_text(text.replace(old, new))
        PY

        cmake $CMAKE_ARGS \
          "${cmake_osx_architectures_args[@]}" \
          -GNinja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$openrv_prefix" \
          -DCMAKE_INSTALL_LIBDIR=lib \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
          -DBUILD_TESTING=OFF \
          -DGIT_SUBMODULE=OFF \
          -DRV_SHOW_ALL_VARIABLES=OFF \
          -DRV_VFX_PLATFORM=CY2026 \
          -DRV_FFMPEG=8 \
          -DRV_BUILD_OSMESA=OFF \
          -DRV_BUILD_QTBONJOUR=OFF \
          -DRV_DEPS_QT_LOCATION="$qt_root" \
          -DRV_DEPS_QT_COPY=OFF \
          -DRV_MAJOR_VERSION=3 \
          -DRV_MINOR_VERSION=2 \
          -DRV_REVISION_NUMBER=0 \
          -DRV_VERSION_YEAR=2026 \
          -B "$SRC_DIR/../build" \
          -S .

        cmake --build "$SRC_DIR/../build" --target install --parallel "${CPU_COUNT:-2}"

        rm -rf \
          "$openrv_prefix/include" \
          "$openrv_prefix/src" \
          "$openrv_prefix/RV.app/Contents/include" \
          "$openrv_prefix/RV.app/Contents/src"

        mkdir -p "$PREFIX/bin"
        cat > "$PREFIX/bin/rv" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        prefix="$(cd "$(dirname "${BASH_SOURCE[0]}")/.." && pwd)"
        openrv_root="$prefix/opt/openrv"
        qt_root="$prefix"

        if [ -d "$openrv_root/RV.app/Contents" ]; then
            rv_home="$openrv_root/RV.app/Contents"
            rv_bin="$rv_home/MacOS/RV"
        else
            rv_home="$openrv_root"
            rv_bin="$openrv_root/bin/rv.bin"
        fi

        if [ ! -x "$rv_bin" ]; then
            rv_bin="$openrv_root/bin/rv"
        fi

        prepend_path_var() {
            var_name="$1"
            path_value="$2"
            eval "current_value=\${$var_name:-}"
            if [ -n "$current_value" ]; then
                export "$var_name=$path_value:$current_value"
            else
                export "$var_name=$path_value"
            fi
        }

        export RV_HOME="${RV_HOME:-$rv_home}"
        prepend_path_var PATH "$openrv_root/bin"
        prepend_path_var QT_PLUGIN_PATH "$qt_root/lib/qt6/plugins"
        prepend_path_var QML2_IMPORT_PATH "$qt_root/lib/qt6/qml"

        first_existing() {
            for path_value in "$@"; do
                if [ -e "$path_value" ]; then
                    printf '%s\n' "$path_value"
                    return 0
                fi
            done
            return 1
        }

        if [ -z "${QTWEBENGINEPROCESS_PATH:-}" ]; then
            qtwebengine_process="$(first_existing \
                "$qt_root/lib/qt6/QtWebEngineProcess" \
                "$qt_root/lib/qt6/libexec/QtWebEngineProcess" \
                "$qt_root/lib/qt6/libexec/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess" \
                "$qt_root/libexec/QtWebEngineProcess" \
                "$qt_root/libexec/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess" \
                "$qt_root/bin/QtWebEngineProcess" || true)"
            if [ -n "$qtwebengine_process" ]; then
                export QTWEBENGINEPROCESS_PATH="$qtwebengine_process"
            fi
        fi
        if [ -z "${QTWEBENGINE_RESOURCES_PATH:-}" ]; then
            qtwebengine_resources="$(first_existing "$qt_root/share/qt6/resources" "$qt_root/lib/qt6/resources" || true)"
            if [ -n "$qtwebengine_resources" ]; then
                export QTWEBENGINE_RESOURCES_PATH="$qtwebengine_resources"
            fi
        fi
        if [ -z "${QTWEBENGINE_LOCALES_PATH:-}" ]; then
            qtwebengine_locales="$(first_existing \
                "$qt_root/share/qt6/translations/qtwebengine_locales" \
                "$qt_root/lib/qt6/translations/qtwebengine_locales" || true)"
            if [ -n "$qtwebengine_locales" ]; then
                export QTWEBENGINE_LOCALES_PATH="$qtwebengine_locales"
            fi
        fi

        case "$(uname -s)" in
            Darwin)
                prepend_path_var DYLD_LIBRARY_PATH "$rv_home/lib"
                prepend_path_var DYLD_LIBRARY_PATH "$rv_home/Frameworks"
                prepend_path_var DYLD_LIBRARY_PATH "$qt_root/lib"
                ;;
            Linux)
                export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
                if [ -z "${DBUS_SYSTEM_BUS_ADDRESS:-}" ]; then
                    if [ -S /run/dbus/system_bus_socket ]; then
                        export DBUS_SYSTEM_BUS_ADDRESS="unix:path=/run/dbus/system_bus_socket"
                    elif [ -S /var/run/dbus/system_bus_socket ]; then
                        export DBUS_SYSTEM_BUS_ADDRESS="unix:path=/var/run/dbus/system_bus_socket"
                    fi
                fi
                prepend_path_var LD_LIBRARY_PATH "$rv_home/lib"
                prepend_path_var LD_LIBRARY_PATH "$qt_root/lib"
                ;;
        esac

        exec "$rv_bin" "$@"
        EOF
        chmod +x "$PREFIX/bin/rv"
    - if: win
      then: |
        cmake -E rm -rf %SRC_DIR%\..\build
        set "BUILD_PREFIX_FWD=%BUILD_PREFIX:\=/%"
        set "LIBRARY_PREFIX_FWD=%LIBRARY_PREFIX:\=/%"
        set "OPENRV_PREFIX=%LIBRARY_PREFIX%\opt\openrv"
        set "OPENRV_PREFIX_FWD=%OPENRV_PREFIX:\=/%"
        set "CL=/utf-8 %CL%"
        set "CXXFLAGS=%CXXFLAGS% /utf-8"
        set "PATH=%BUILD_PREFIX%;%BUILD_PREFIX%\bin;%BUILD_PREFIX%\Scripts;%BUILD_PREFIX%\Library\bin;%PATH%;%BUILD_PREFIX%\Library\usr\bin"
        set "CMAKE_GENERATOR=Ninja"
        set "CMAKE_GENERATOR_PLATFORM="
        set "CMAKE_GENERATOR_TOOLSET="
        if "%CPU_COUNT%"=="" set "CPU_COUNT=2"
        set "QT_PLUGIN_PATH=%LIBRARY_PREFIX%\lib\qt6\plugins;%QT_PLUGIN_PATH%"
        set "QT_QPA_PLATFORM_PLUGIN_PATH=%LIBRARY_PREFIX%\lib\qt6\plugins\platforms;%QT_QPA_PLATFORM_PLUGIN_PATH%"
        set "QML2_IMPORT_PATH=%LIBRARY_PREFIX%\lib\qt6\qml;%QML2_IMPORT_PATH%"

        cmake %CMAKE_ARGS% ^
          -GNinja ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DCMAKE_INSTALL_PREFIX=%OPENRV_PREFIX_FWD% ^
          -DCMAKE_INSTALL_LIBDIR=lib ^
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
          -DBUILD_TESTING=OFF ^
          -DGIT_SUBMODULE=OFF ^
          -DRV_SHOW_ALL_VARIABLES=OFF ^
          -DRV_VFX_PLATFORM=CY2026 ^
          -DRV_FFMPEG=8 ^
          -DRV_BUILD_OSMESA=OFF ^
          -DRV_BUILD_QTBONJOUR=OFF ^
          -DRV_DEPS_QT_LOCATION=%LIBRARY_PREFIX_FWD% ^
          -DRV_DEPS_QT_COPY=OFF ^
          -DRV_DEPS_WIN_PERL_ROOT=%BUILD_PREFIX_FWD%/Library/bin ^
          -DRV_MAJOR_VERSION=3 ^
          -DRV_MINOR_VERSION=2 ^
          -DRV_REVISION_NUMBER=0 ^
          -DRV_VERSION_YEAR=2026 ^
          -B %SRC_DIR%\..\build ^
          -S .
        if %ERRORLEVEL% neq 0 exit /b 1

        cmake --build %SRC_DIR%\..\build --target install --config Release --parallel %CPU_COUNT%
        if %ERRORLEVEL% neq 0 exit /b 1

        if exist "%OPENRV_PREFIX%\include" rmdir /s /q "%OPENRV_PREFIX%\include"
        if exist "%OPENRV_PREFIX%\src" rmdir /s /q "%OPENRV_PREFIX%\src"

        if not exist "%SCRIPTS%" mkdir "%SCRIPTS%"
        (
          echo @echo off
          echo setlocal
          echo set "OPENRV_ROOT=%%CONDA_PREFIX%%\Library\opt\openrv"
          echo set "RV_HOME=%%OPENRV_ROOT%%"
          echo set "PATH=%%OPENRV_ROOT%%\bin;%%OPENRV_ROOT%%\lib;%%CONDA_PREFIX%%\Library\bin;%%PATH%%"
          echo set "QT_PLUGIN_PATH=%%CONDA_PREFIX%%\Library\lib\qt6\plugins;%%QT_PLUGIN_PATH%%"
          echo set "QML2_IMPORT_PATH=%%CONDA_PREFIX%%\Library\lib\qt6\qml;%%QML2_IMPORT_PATH%%"
          echo if not defined HOME if defined USERPROFILE set "HOME=%%USERPROFILE%%"
          echo if not defined QTWEBENGINEPROCESS_PATH if exist "%%CONDA_PREFIX%%\Library\lib\qt6\QtWebEngineProcess.exe" set "QTWEBENGINEPROCESS_PATH=%%CONDA_PREFIX%%\Library\lib\qt6\QtWebEngineProcess.exe"
          echo if not defined QTWEBENGINEPROCESS_PATH if exist "%%CONDA_PREFIX%%\Library\lib\qt6\libexec\QtWebEngineProcess.exe" set "QTWEBENGINEPROCESS_PATH=%%CONDA_PREFIX%%\Library\lib\qt6\libexec\QtWebEngineProcess.exe"
          echo if not defined QTWEBENGINEPROCESS_PATH if exist "%%CONDA_PREFIX%%\Library\bin\QtWebEngineProcess.exe" set "QTWEBENGINEPROCESS_PATH=%%CONDA_PREFIX%%\Library\bin\QtWebEngineProcess.exe"
          echo if not defined QTWEBENGINE_RESOURCES_PATH if exist "%%CONDA_PREFIX%%\Library\share\qt6\resources" set "QTWEBENGINE_RESOURCES_PATH=%%CONDA_PREFIX%%\Library\share\qt6\resources"
          echo if not defined QTWEBENGINE_RESOURCES_PATH if exist "%%CONDA_PREFIX%%\Library\lib\qt6\resources" set "QTWEBENGINE_RESOURCES_PATH=%%CONDA_PREFIX%%\Library\lib\qt6\resources"
          echo if not defined QTWEBENGINE_LOCALES_PATH if exist "%%CONDA_PREFIX%%\Library\share\qt6\translations\qtwebengine_locales" set "QTWEBENGINE_LOCALES_PATH=%%CONDA_PREFIX%%\Library\share\qt6\translations\qtwebengine_locales"
          echo if not defined QTWEBENGINE_LOCALES_PATH if exist "%%CONDA_PREFIX%%\Library\lib\qt6\translations\qtwebengine_locales" set "QTWEBENGINE_LOCALES_PATH=%%CONDA_PREFIX%%\Library\lib\qt6\translations\qtwebengine_locales"
          echo "%%OPENRV_ROOT%%\bin\rv.exe" %%*
          echo exit /b %%ERRORLEVEL%%
        ) > "%SCRIPTS%\rv.bat"

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - cmake >=3.31,<4
    - git
    - ninja
    - python >=3.13,<3.14
    - requests
    - 7zip
    - setuptools
    - wheel
    - pip
    - meson
    - perl
    - nasm
    - yasm
    - if: unix
      then:
        - make
        - pkg-config
        - autoconf
        - automake
        - libtool
        - bison
        - flex
        - zip
        - unzip
    - if: win
      then:
        - winflexbison
        - m2-base
        - m2-make
        - m2-patch
        - m2-sed
        - m2-grep
        - m2-diffutils
        - m2-autoconf
        - m2-automake-wrapper
        - m2-libtool
        - m2-zip
        - m2-unzip
  host:
    - qt6-main ==6.10.2
    - qt6-webengine ==6.10.2
    - qt6-multimedia ==6.10.2
    - yaml-cpp >=0.8,<0.9
    - if: unix
      then:
        - readline
    - if: linux
      then:
        - alsa-lib
        - freetype
        - libaio
        - libgl-devel
        - libglvnd-devel
        - libglu
        - mesa-libgl-devel-cos7-x86_64
        - libudev
        - xorg-libx11
  run:
    - qt6-main ==6.10.2
    - qt6-webengine ==6.10.2
    - qt6-multimedia ==6.10.2
    - yaml-cpp >=0.8,<0.9
    - if: unix
      then:
        - readline
    - if: linux
      then:
        - alsa-lib
        - freetype
        - libaio
        - libgl-devel
        - libglu
        - libudev1
        - xorg-libx11

tests:
  - script:
      - if: unix
        then:
          - test -x "$PREFIX/bin/rv"
          - bash -n "$PREFIX/bin/rv"
          - test -d "$PREFIX/opt/openrv"
          - test -x "$PREFIX/opt/openrv/bin/rv.bin" || test -x "$PREFIX/opt/openrv/RV.app/Contents/MacOS/RV"
          - test -d "$PREFIX/lib/qt6/plugins"
          - test -d "$PREFIX/lib/qt6/qml"
          - test -x "$PREFIX/lib/qt6/QtWebEngineProcess" || test -x "$PREFIX/lib/qt6/libexec/QtWebEngineProcess" || test -x "$PREFIX/lib/qt6/libexec/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess" || test -x "$PREFIX/libexec/QtWebEngineProcess" || test -x "$PREFIX/libexec/QtWebEngineProcess.app/Contents/MacOS/QtWebEngineProcess" || test -x "$PREFIX/bin/QtWebEngineProcess"
          - test -d "$PREFIX/share/qt6/resources" || test -d "$PREFIX/lib/qt6/resources"
          - test -d "$PREFIX/share/qt6/translations/qtwebengine_locales" || test -d "$PREFIX/lib/qt6/translations/qtwebengine_locales"
          - mkdir -p "$PREFIX/openrv-test-home"
          - HOME="$PREFIX/openrv-test-home" "$PREFIX/bin/rv" -version | grep -x "3.2.0"
      - if: win
        then:
          - if not exist "%SCRIPTS%\rv.bat" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\opt\openrv" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\opt\openrv\bin\rv.exe" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\lib\qt6\plugins" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\lib\qt6\qml" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\lib\qt6\QtWebEngineProcess.exe" if not exist "%LIBRARY_PREFIX%\lib\qt6\libexec\QtWebEngineProcess.exe" if not exist "%LIBRARY_PREFIX%\bin\QtWebEngineProcess.exe" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\share\qt6\resources" if not exist "%LIBRARY_PREFIX%\lib\qt6\resources" exit /b 1
          - if not exist "%LIBRARY_PREFIX%\share\qt6\translations\qtwebengine_locales" if not exist "%LIBRARY_PREFIX%\lib\qt6\translations\qtwebengine_locales" exit /b 1
          - if not exist "%PREFIX%\openrv-test-home" mkdir "%PREFIX%\openrv-test-home"
          - set "HOME=%PREFIX%\openrv-test-home"
          - '"%SCRIPTS%\rv.bat" -version > "%PREFIX%\openrv-version.txt"'
          - findstr /R /C:"^3\.2\.0$" "%PREFIX%\openrv-version.txt"

about:
  homepage: https://github.com/AcademySoftwareFoundation/OpenRV
  repository: https://github.com/AcademySoftwareFoundation/OpenRV
  license: Apache-2.0
  license_file: LICENSE
  summary: Open RV playback and review application
  description: |
    Open RV is an image and sequence playback, review, and inspection
    application for visual effects, animation, and production workflows.
