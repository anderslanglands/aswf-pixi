context:
  version: "9.1.0"
  build_number: 0
  github_tag: v9.1.0
  archive_sha256: 3a29b2254107fdfbb5e6bbad3ec154dd682149121f61e9c406607ac7b52a6ba6

package:
  name: optix-dev
  version: ${{ version }}

build:
  number: ${{ build_number }}
  skip:
    - if: target_platform != "linux-64" and target_platform != "win-64"
      then: true
  script:
    - if: unix
      then: |
        set -euo pipefail
        recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
        if [ -z "$recipe_dir" ]; then
          echo "RECIPE_DIR is not set" >&2
          exit 1
        fi
        cmake \
          -DOPTIX_STUB_PREFIX="$PREFIX" \
          -DOPTIX_STUB_LIBRARY_PREFIX="$PREFIX" \
          -P "$recipe_dir/cmake/install-stub.cmake"
        chmod +x "$PREFIX/etc/conda/activate.d/optix-dev.sh"
      else: |
        set "RECIPE_DIR_VAR=%RECIPE_DIR%"
        if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
        if "%RECIPE_DIR_VAR%"=="" (
          echo RECIPE_DIR is not set
          exit /b 1
        )
        set "PREFIX_FWD=%PREFIX:\=/%"
        set "LIBRARY_PREFIX_FWD=%LIBRARY_PREFIX:\=/%"
        cmake ^
          -DOPTIX_STUB_PREFIX="%PREFIX_FWD%" ^
          -DOPTIX_STUB_LIBRARY_PREFIX="%LIBRARY_PREFIX_FWD%" ^
          -P "%RECIPE_DIR_VAR%\cmake\install-stub.cmake"

requirements:
  build:
    - cmake
  run:
    - cuda-cudart-dev
    - if: unix
      then:
        - coreutils
        - curl
        - gzip
        - tar


tests:
  - package_contents:
      files:
        exists:
          - if: unix
            then: etc/conda/activate.d/optix-dev.sh
          - if: win
            then: etc/conda/activate.d/optix-dev.bat
          - if: win
            then: etc/conda/activate.d/optix-dev.ps1
          - if: unix
            then: lib/cmake/OptiX/OptiXConfig.cmake
          - if: unix
            then: lib/cmake/OptiX/OptiXConfigVersion.cmake
          - if: unix
            then: share/optix-dev/README.txt
          - if: win
            then: Library/lib/cmake/OptiX/OptiXConfig.cmake
          - if: win
            then: Library/lib/cmake/OptiX/OptiXConfigVersion.cmake
          - if: win
            then: Library/share/optix-dev/README.txt
          - if: win
            then: Library/share/optix-dev/optix-dev-activate.ps1
        not_exists:
          - include/**
          - opt/**
          - Library/include/**
          - Library/opt/**
          - share/optix-dev/LICENSE.txt
          - share/optix-dev/license_info.txt
          - share/optix-dev/README.md
          - share/optix-dev/*.tar.gz
          - share/optix-dev/*.tgz
          - share/optix-dev/*.zip
          - share/optix-dev/include/**
          - Library/share/optix-dev/LICENSE.txt
          - Library/share/optix-dev/license_info.txt
          - Library/share/optix-dev/README.md
          - Library/share/optix-dev/*.tar.gz
          - Library/share/optix-dev/*.tgz
          - Library/share/optix-dev/*.zip
          - Library/share/optix-dev/include/**
  - script:
      - python tests/check_stub_payload.py
      - if: unix
        then:
          - python tests/check_activation_checksum_failure.py
          - . "$PREFIX/etc/conda/activate.d/optix-dev.sh"
          - python tests/check_optix.py
          - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
          - cmake --build build
          - ./build/optix_consumer
      - if: win
        then:
          - call "%PREFIX%\etc\conda\activate.d\optix-dev.bat"
          - python tests\check_optix.py
          - powershell -NoProfile -ExecutionPolicy Bypass -File tests\check_optix_powershell.ps1
          - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
          - cmake --build build --config Release
          - build\optix_consumer.exe
    files:
      recipe:
        - cmake/install-stub.cmake
        - tests/CMakeLists.txt
        - tests/check_activation_checksum_failure.py
        - tests/check_optix.py
        - tests/check_optix_powershell.ps1
        - tests/check_stub_payload.py
        - tests/optix_consumer.cpp
    requirements:
      run:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - python

about:
  homepage: https://github.com/NVIDIA/optix-dev
  repository: https://github.com/NVIDIA/optix-dev
  license: LicenseRef-NVIDIA-OptiX-dev-download-stub
  summary: Conda activation stub that downloads NVIDIA OptiX development headers from GitHub.
