              echo   Remove-Item Env:CONDA_BACKUP_OPENUSD_PYTHONPATH -ErrorAction SilentlyContinue
              echo } else {
              echo   Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue
              echo }
              echo Remove-Item Env:OPENUSD_PYTHON_ROOT -ErrorAction SilentlyContinue
            ) > "%PREFIX%\etc\conda\deactivate.d\openusd-minimal-python.ps1"
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - jinja2
        - materialx-dev 1.39.*
        - opensubdiv 3.7.*
        - python
        - tbb-devel >=2022.3,<2023

  - staging:
      name: openusd-build
    build:
      script:
        - if: unix
          then: |
            export CXXFLAGS="${CXXFLAGS//-fvisibility-inlines-hidden/}"
            export CXXFLAGS="${CXXFLAGS//-ffunction-sections/}"
            export CXXFLAGS="${CXXFLAGS//-pipe/}"
            export CFLAGS="${CFLAGS//-ffunction-sections/}"
