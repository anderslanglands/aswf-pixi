            build_jobs="${OPENUSD_BUILD_PARALLEL_LEVEL:-${CMAKE_BUILD_PARALLEL_LEVEL:-$detected_jobs}}"
            case "$build_jobs" in
              ''|*[!0-9]*)
                echo "OpenUSD build parallelism must be an integer, got '$build_jobs'"
                exit 1
                ;;
            esac
            if [ "$build_jobs" -lt 1 ] || [ "$build_jobs" -gt 24 ]; then
              echo "OpenUSD build parallelism must be between 1 and 24, got '$build_jobs'"
              exit 1
            fi
            export CMAKE_BUILD_PARALLEL_LEVEL="$build_jobs"
            echo "OpenUSD build parallelism: $build_jobs"

            cmake -E rm -rf $SRC_DIR/../build-openusd

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DPXR_BUILD_MONOLITHIC=OFF \
              -DPXR_ENABLE_PYTHON_SUPPORT=ON \
              -DPXR_PY_UNDEFINED_DYNAMIC_LOOKUP=OFF \
              -DPXR_BUILD_DOCUMENTATION=OFF \
              -DPXR_BUILD_HTML_DOCUMENTATION=OFF \
              -DPXR_BUILD_PYTHON_DOCUMENTATION=OFF \
              -DPXR_BUILD_TESTS=OFF \
              -DPXR_BUILD_EXAMPLES=OFF \
              -DPXR_BUILD_TUTORIALS=OFF \
              -DPXR_BUILD_USD_TOOLS=ON \
              -DPXR_BUILD_IMAGING=ON \
              -DPXR_BUILD_USD_IMAGING=ON \
              -DPXR_BUILD_USD_VALIDATION=ON \
              -DPXR_BUILD_EXEC=ON \
              -DPXR_BUILD_USDVIEW=ON \
              -DPXR_ENABLE_GL_SUPPORT=ON \
              -DPXR_ENABLE_METAL_SUPPORT=ON \
              -DPXR_ENABLE_VULKAN_SUPPORT=OFF \
              -DPXR_BUILD_OPENIMAGEIO_PLUGIN=ON \
              -DPXR_BUILD_OPENCOLORIO_PLUGIN=ON \
              -DPXR_BUILD_IMAGEIO_PLUGIN=ON \
              -DPXR_BUILD_ALEMBIC_PLUGIN=OFF \
              -DPXR_BUILD_DRACO_PLUGIN=ON \
              -DPXR_BUILD_PRMAN_PLUGIN=OFF \
              -DPXR_BUILD_EMBREE_PLUGIN=ON \
              -DPXR_ENABLE_MATERIALX_SUPPORT=ON \
              -DPXR_ENABLE_OSL_SUPPORT=OFF \
              -DPXR_ENABLE_PTEX_SUPPORT=OFF \
              -DPXR_ENABLE_OPENVDB_SUPPORT=ON \
              -DPXR_ENABLE_HDF5_SUPPORT=OFF \
              -DPXR_BUILD_MAYAPY_TESTS=OFF \
              -DPXR_BUILD_ANIMX_TESTS=OFF \
              -DPXR_STRICT_BUILD_MODE=OFF \
              -DPXR_VALIDATE_GENERATED_CODE=OFF \
              -DPXR_ENABLE_PRECOMPILED_HEADERS=OFF \
              -DPXR_FIND_TBB_IN_CONFIG=ON \
              -DTBB_ROOT=$PREFIX \
              -DTBB_ROOT_DIR=$PREFIX \
              -DOpenSubdiv_ROOT=$PREFIX \
              -DOPENSUBDIV_ROOT_DIR=$PREFIX \
              -DOpenImageIO_ROOT=$PREFIX \
              -DOIIO_LOCATION=$PREFIX \
              -DOpenColorIO_ROOT=$PREFIX \
              -DMaterialX_ROOT=$PREFIX \
              -DOPENVDB_LOCATION=$PREFIX \
              -DOpenVDB_ROOT=$PREFIX \
              -DDRACO_ROOT=$PREFIX \
              -DEMBREE_LOCATION=$PREFIX \
              -DPython3_EXECUTABLE=$PYTHON \
              -DPython3_ROOT_DIR=$PREFIX \
              -DPython3_FIND_STRATEGY=LOCATION \
              -DPython3_FIND_REGISTRY=NEVER \
              -DPython3_FIND_FRAMEWORK=NEVER \
              -DPXR_PYTHON_SHEBANG=$PYTHON \
              -B $SRC_DIR/../build-openusd \
              -S .

            cmake --build $SRC_DIR/../build-openusd --target install --parallel "$build_jobs"

            mkdir -p "$PREFIX/etc/conda/activate.d" "$PREFIX/etc/conda/deactivate.d"
            cat > "$PREFIX/etc/conda/activate.d/openusd.sh" <<'EOF'
            if [ -z "${_OPENUSD_PYTHONPATH_SET:-}" ]; then
              export _OPENUSD_PYTHONPATH_SET=1
              if [ -n "${PYTHONPATH+x}" ]; then
                export _OPENUSD_PYTHON_OLD_PYTHONPATH="${PYTHONPATH}"
                export PYTHONPATH="${CONDA_PREFIX}/lib/python:${PYTHONPATH}"
              else
                unset _OPENUSD_PYTHON_OLD_PYTHONPATH
                export PYTHONPATH="${CONDA_PREFIX}/lib/python"
              fi
            fi
            export OPENUSD_PYTHON_ROOT="${CONDA_PREFIX}/lib/python"
            EOF

            cat > "$PREFIX/etc/conda/deactivate.d/openusd.sh" <<'EOF'
            if [ -n "${_OPENUSD_PYTHONPATH_SET:-}" ]; then
              if [ -n "${_OPENUSD_PYTHON_OLD_PYTHONPATH+x}" ]; then
                export PYTHONPATH="${_OPENUSD_PYTHON_OLD_PYTHONPATH}"
              else
                unset PYTHONPATH
              fi
              unset _OPENUSD_PYTHONPATH_SET
              unset _OPENUSD_PYTHON_OLD_PYTHONPATH
            fi
            unset OPENUSD_PYTHON_ROOT
            EOF
        - if: win
          then: |
            set "CL=/utf-8 %CL%"
            set "CXXFLAGS=%CXXFLAGS% /utf-8"
            set "LIBRARY_PREFIX_FWD=%LIBRARY_PREFIX:\=/%"

            if "%OPENUSD_BUILD_PARALLEL_LEVEL%"=="" (
              if "%CMAKE_BUILD_PARALLEL_LEVEL%"=="" (
                set "BUILD_JOBS=%NUMBER_OF_PROCESSORS%"
              ) else (
                set "BUILD_JOBS=%CMAKE_BUILD_PARALLEL_LEVEL%"
              )
            ) else (
              set "BUILD_JOBS=%OPENUSD_BUILD_PARALLEL_LEVEL%"
            )
            echo %BUILD_JOBS%| findstr /R "^[1-9][0-9]*$" >nul
            if errorlevel 1 (
              echo OpenUSD build parallelism must be an integer, got '%BUILD_JOBS%'
              exit /b 1
            )
            if %BUILD_JOBS% LSS 1 exit /b 1
            if %BUILD_JOBS% GTR 24 (
              echo OpenUSD build parallelism must be between 1 and 24, got '%BUILD_JOBS%'
              exit /b 1
            )
            set "CMAKE_BUILD_PARALLEL_LEVEL=%BUILD_JOBS%"
            echo OpenUSD build parallelism: %BUILD_JOBS%

            cmake -E rm -rf %SRC_DIR%\..\build-openusd

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX_FWD% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DPXR_BUILD_MONOLITHIC=OFF ^
              -DPXR_ENABLE_PYTHON_SUPPORT=ON ^
              -DPXR_PY_UNDEFINED_DYNAMIC_LOOKUP=OFF ^
              -DPXR_BUILD_DOCUMENTATION=OFF ^
              -DPXR_BUILD_HTML_DOCUMENTATION=OFF ^
              -DPXR_BUILD_PYTHON_DOCUMENTATION=OFF ^
              -DPXR_BUILD_TESTS=OFF ^
              -DPXR_BUILD_EXAMPLES=OFF ^
              -DPXR_BUILD_TUTORIALS=OFF ^
              -DPXR_BUILD_USD_TOOLS=ON ^
              -DPXR_BUILD_IMAGING=ON ^
              -DPXR_BUILD_USD_IMAGING=ON ^
              -DPXR_BUILD_USD_VALIDATION=ON ^
              -DPXR_BUILD_EXEC=ON ^
              -DPXR_BUILD_USDVIEW=ON ^
              -DPXR_ENABLE_GL_SUPPORT=ON ^
              -DPXR_ENABLE_METAL_SUPPORT=OFF ^
              -DPXR_ENABLE_VULKAN_SUPPORT=OFF ^
              -DPXR_BUILD_OPENIMAGEIO_PLUGIN=ON ^
              -DPXR_BUILD_OPENCOLORIO_PLUGIN=ON ^
              -DPXR_BUILD_IMAGEIO_PLUGIN=ON ^
              -DPXR_BUILD_ALEMBIC_PLUGIN=OFF ^
              -DPXR_BUILD_DRACO_PLUGIN=ON ^
              -DPXR_BUILD_PRMAN_PLUGIN=OFF ^
              -DPXR_BUILD_EMBREE_PLUGIN=ON ^
              -DPXR_ENABLE_MATERIALX_SUPPORT=ON ^
              -DPXR_ENABLE_OSL_SUPPORT=OFF ^
              -DPXR_ENABLE_PTEX_SUPPORT=OFF ^
              -DPXR_ENABLE_OPENVDB_SUPPORT=ON ^
              -DPXR_ENABLE_HDF5_SUPPORT=OFF ^
              -DPXR_BUILD_MAYAPY_TESTS=OFF ^
              -DPXR_BUILD_ANIMX_TESTS=OFF ^
              -DPXR_STRICT_BUILD_MODE=OFF ^
              -DPXR_VALIDATE_GENERATED_CODE=OFF ^
              -DPXR_ENABLE_PRECOMPILED_HEADERS=OFF ^
              -DPXR_FIND_TBB_IN_CONFIG=ON ^
              -DTBB_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DTBB_ROOT_DIR=%LIBRARY_PREFIX_FWD% ^
              -DOpenSubdiv_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DOPENSUBDIV_ROOT_DIR=%LIBRARY_PREFIX_FWD% ^
              -DOpenImageIO_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DOIIO_LOCATION=%LIBRARY_PREFIX_FWD% ^
              -DOpenColorIO_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DMaterialX_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DOPENVDB_LOCATION=%LIBRARY_PREFIX_FWD% ^
              -DOpenVDB_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DDRACO_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DEMBREE_LOCATION=%LIBRARY_PREFIX_FWD% ^
              -DPython3_EXECUTABLE=%PYTHON% ^
              -DPython3_ROOT_DIR=%PREFIX% ^
              -DPython3_FIND_STRATEGY=LOCATION ^
              -DPython3_FIND_REGISTRY=NEVER ^
              -DPython3_FIND_FRAMEWORK=NEVER ^
              -DPXR_PYTHON_SHEBANG=%PYTHON% ^
              -B %SRC_DIR%\..\build-openusd ^
              -S .
            if %ERRORLEVEL% neq 0 exit /b 1

            cmake --build %SRC_DIR%\..\build-openusd --target install --config Release --parallel %BUILD_JOBS%
            if %ERRORLEVEL% neq 0 exit /b 1

            if not exist "%PREFIX%\etc\conda\activate.d" mkdir "%PREFIX%\etc\conda\activate.d"
            if not exist "%PREFIX%\etc\conda\deactivate.d" mkdir "%PREFIX%\etc\conda\deactivate.d"
            (
              echo @echo off
              echo if not defined CONDA_BACKUP_OPENUSD_PATH ^(
              echo   set "CONDA_BACKUP_OPENUSD_PATH=%%PATH%%"
              echo   set "PATH=%%CONDA_PREFIX%%\Library\lib;%%PATH%%"
              echo ^)
              echo if defined PYTHONPATH ^(
              echo   set "CONDA_BACKUP_OPENUSD_PYTHONPATH=%%PYTHONPATH%%"
              echo   set "PYTHONPATH=%%CONDA_PREFIX%%\Library\lib\python;%%PYTHONPATH%%"
              echo ^) else ^(
              echo   set "CONDA_BACKUP_OPENUSD_PYTHONPATH="
              echo   set "PYTHONPATH=%%CONDA_PREFIX%%\Library\lib\python"
              echo ^)
              echo set "OPENUSD_PYTHON_ROOT=%%CONDA_PREFIX%%\Library\lib\python"
            ) > "%PREFIX%\etc\conda\activate.d\openusd.bat"
            (
              echo if ^(-not ^(Test-Path Env:CONDA_BACKUP_OPENUSD_PATH^)^) {
              echo   $env:CONDA_BACKUP_OPENUSD_PATH = $env:PATH
              echo   $env:PATH = "$env:CONDA_PREFIX\Library\lib;$env:PATH"
              echo }
              echo if ^(Test-Path Env:PYTHONPATH^) {
              echo   $env:CONDA_BACKUP_OPENUSD_PYTHONPATH = $env:PYTHONPATH
              echo   $env:PYTHONPATH = "$env:CONDA_PREFIX\Library\lib\python;$env:PYTHONPATH"
              echo } else {
              echo   Remove-Item Env:CONDA_BACKUP_OPENUSD_PYTHONPATH -ErrorAction SilentlyContinue
              echo   $env:PYTHONPATH = "$env:CONDA_PREFIX\Library\lib\python"
              echo }
              echo $env:OPENUSD_PYTHON_ROOT = "$env:CONDA_PREFIX\Library\lib\python"
            ) > "%PREFIX%\etc\conda\activate.d\openusd.ps1"
            (
              echo @echo off
              echo if defined CONDA_BACKUP_OPENUSD_PATH ^(
              echo   set "PATH=%%CONDA_BACKUP_OPENUSD_PATH%%"
              echo ^)
              echo set "CONDA_BACKUP_OPENUSD_PATH="
              echo if defined CONDA_BACKUP_OPENUSD_PYTHONPATH ^(
              echo   set "PYTHONPATH=%%CONDA_BACKUP_OPENUSD_PYTHONPATH%%"
              echo ^) else ^(
              echo   set "PYTHONPATH="
              echo ^)
              echo set "CONDA_BACKUP_OPENUSD_PYTHONPATH="
              echo set "OPENUSD_PYTHON_ROOT="
            ) > "%PREFIX%\etc\conda\deactivate.d\openusd.bat"
            (
              echo if ^(Test-Path Env:CONDA_BACKUP_OPENUSD_PATH^) {
              echo   $env:PATH = $env:CONDA_BACKUP_OPENUSD_PATH
              echo   Remove-Item Env:CONDA_BACKUP_OPENUSD_PATH -ErrorAction SilentlyContinue
              echo }
              echo if ^(Test-Path Env:CONDA_BACKUP_OPENUSD_PYTHONPATH^) {
              echo   $env:PYTHONPATH = $env:CONDA_BACKUP_OPENUSD_PYTHONPATH
              echo   Remove-Item Env:CONDA_BACKUP_OPENUSD_PYTHONPATH -ErrorAction SilentlyContinue
              echo } else {
              echo   Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue
              echo }
              echo Remove-Item Env:OPENUSD_PYTHON_ROOT -ErrorAction SilentlyContinue
            ) > "%PREFIX%\etc\conda\deactivate.d\openusd.ps1"
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - blosc
        - draco
        - embree
        - imath-dev 3.2.*
        - jinja2
        - libboost-devel
        - materialx-dev 1.39.*
        - materialx-render 1.39.*
        - openimageio-dev 3.1.*
        - opencolorio-dev 2.5.*
        - opensubdiv-gpu-dev 3.7.*
        - openvdb-dev 13.0.*
        - pyopengl
        - pyside6
        - python
        - tbb-devel >=2022.3,<2023
        - zlib
        - if: linux
          then:
            - libegl-devel
            - libgl-devel
            - xorg-libx11
            - xorg-libxext
            - xorg-xorgproto

  - package:
      name: openusd-minimal-lib
    inherit: openusd-minimal-build
    build:
      files:
        - lib/libusd_*.so*
        - lib/libusd_*.dylib*
        - lib/usd/**
        - plugin/usd/**
        - share/usd/**
        - Library/bin/usd_*.dll
        - Library/lib/usd_*.dll
        - etc/conda/activate.d/openusd-minimal-lib.*
        - etc/conda/deactivate.d/openusd-minimal-lib.*
        - Library/lib/usd/**
        - Library/plugin/usd/**
        - Library/share/usd/**
    requirements:
      run:
        - materialx-lib 1.39.*
        - opensubdiv-lib 3.7.*
        - tbb >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-python <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('openusd-minimal-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/pxr/pxr.h
              - pxrConfig.cmake
              - cmake/pxrTargets.cmake
              - bin/usdcat
              - lib/python/pxr
              - Library/include/pxr/pxr.h
              - Library/pxrConfig.cmake
              - Library/cmake/pxrTargets.cmake
              - Library/bin/usdcat.exe
              - Library/lib/python/pxr
      - script:
          - if: linux
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libusd_usd.so*')); assert paths; ctypes.CDLL(paths[0])"
          - if: osx
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libusd_usd*.dylib*')); assert paths; ctypes.CDLL(paths[0])"
          - if: win
            then:
              - where usd_usd.dll
              - python -c "import ctypes, os; ctypes.WinDLL(os.path.join(os.environ['LIBRARY_LIB'], 'usd_usd.dll'))"
        requirements:
          run:
            - python

  - package:
      name: openusd-minimal-dev
    inherit: openusd-minimal-build
    build:
      files:
        - include/pxr/**
        - pxrConfig.cmake
        - cmake/**
        - Library/include/pxr/**
        - Library/pxrConfig.cmake
        - Library/cmake/**
        - Library/lib/usd_*.lib
    requirements:
      run:
        - ${{ pin_subpackage('openusd-minimal-lib', exact=True) }}
        - materialx-dev 1.39.*
        - opensubdiv-dev 3.7.*
        - tbb-devel >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-python <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('openusd-minimal-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - pxr/pxr.h
            - pxr/usd/usd/stage.h
          files:
            not_exists:
              - bin/usdcat
              - lib/python/pxr
              - Library/bin/usdcat.exe
              - Library/lib/python/pxr
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/pxrConfig.cmake"
              - test -f "$PREFIX/cmake/pxrTargets.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openusd_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\pxrConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_PREFIX%\cmake\pxrTargets.cmake" exit /b 1
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openusd_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openusd_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: openusd-minimal-tools
    inherit:
      from: openusd-minimal-build
      run_exports: false
    build:
      files:
        - bin/usd*
        - Library/bin/usd*.exe
    requirements:
      run:
        - ${{ pin_subpackage('openusd-minimal-lib', exact=True) }}
        - materialx-lib 1.39.*
        - opensubdiv-lib 3.7.*
        - tbb >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-python <0a0
    tests:
      - script:
          - usdcat --help
          - if: unix
            then:
              - test ! -e "$PREFIX/bin/usdview"
              - test ! -d "$PREFIX/lib/python/pxr"
          - if: win
            then:
              - if exist "%LIBRARY_BIN%\usdview.exe" exit /b 1
              - if exist "%LIBRARY_LIB%\python\pxr" exit /b 1

  - package:
      name: openusd-minimal-python
    inherit: openusd-minimal-python-build
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - "**"
    requirements:
      run:
        - materialx-dev 1.39.*
        - opensubdiv-dev 3.7.*
        - python
        - tbb-devel >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-lib <0a0
        - openusd-minimal-dev <0a0
        - openusd-minimal-tools <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('openusd-minimal-python', upper_bound='x.x') }}
    tests:
      - script:
          - usdcat --help
          - if: unix
            then:
              - test -f "$PREFIX/pxrConfig.cmake"
              - test -f "$PREFIX/cmake/pxrTargets.cmake"
              - test -d "$PREFIX/lib/python/pxr"
              - PYTHONPATH="$PREFIX/lib/python${PYTHONPATH:+:$PYTHONPATH}" python -c "from pxr import Tf, Usd, UsdMtlx; assert Usd.GetVersion()[1:] == (26, 5)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openusd_consumer
              - test ! -e "$PREFIX/bin/usdview"
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\pxrConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_PREFIX%\cmake\pxrTargets.cmake" exit /b 1
              - if not exist "%LIBRARY_LIB%\python\pxr" exit /b 1
              - set "PYTHONPATH=%LIBRARY_LIB%\python;%PYTHONPATH%" && python -c "from pxr import Tf, Usd, UsdMtlx; assert Usd.GetVersion()[1:] == (26, 5)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openusd_consumer.exe
              - if exist "%LIBRARY_BIN%\usdview.exe" exit /b 1
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openusd_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - python

  - package:
      name: openusd
    inherit: openusd-build
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - "**"
    requirements:
      run:
        - draco
        - embree
        - materialx-dev 1.39.*
        - materialx-render 1.39.*
        - openimageio-dev 3.1.*
        - opencolorio-dev 2.5.*
        - opensubdiv-gpu-dev 3.7.*
        - openvdb-dev 13.0.*
        - pyopengl
        - pyside6
        - python
        - tbb-devel >=2022.3,<2023
        - if: linux
          then:
            - libgl
            - xorg-libx11
            - xorg-libxext
      run_constraints:
        - openusd-minimal-lib <0a0
        - openusd-minimal-dev <0a0
        - openusd-minimal-tools <0a0
        - openusd-minimal-python <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('openusd', upper_bound='x.x') }}
    tests:
      - script:
          - usdcat --help
          - if: unix
            then:
              - test -x "$PREFIX/bin/usdview"
              - test -f "$PREFIX/pxrConfig.cmake"
              - test -f "$PREFIX/cmake/pxrTargets.cmake"
              - test -d "$PREFIX/lib/python/pxr"
              - PYTHONPATH="$PREFIX/lib/python${PYTHONPATH:+:$PYTHONPATH}" python -c "from pxr import Tf, Usd, UsdImagingGL, UsdMtlx; assert Usd.GetVersion()[1:] == (26, 5)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openusd_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\pxrConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_PREFIX%\cmake\pxrTargets.cmake" exit /b 1
              - if not exist "%LIBRARY_LIB%\python\pxr" exit /b 1
              - if not exist "%LIBRARY_BIN%\usdview" if not exist "%LIBRARY_BIN%\usdview.cmd" if not exist "%LIBRARY_BIN%\usdview.exe" exit /b 1
              - set "PYTHONPATH=%LIBRARY_LIB%\python;%PYTHONPATH%" && python -c "from pxr import Tf, Usd, UsdImagingGL, UsdMtlx; assert Usd.GetVersion()[1:] == (26, 5)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openusd_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openusd_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - python

