        - Library/include/pxr/**
        - Library/pxrConfig.cmake
        - Library/cmake/**
        - Library/lib/usd_*.lib
    requirements:
      run:
        - ${{ pin_subpackage('openusd-minimal-lib', exact=True) }}
        - materialx-dev 1.39.*
        - opensubdiv-dev 3.7.*
        - tbb-devel >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-python <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('openusd-minimal-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - pxr/pxr.h
            - pxr/usd/usd/stage.h
          files:
            not_exists:
              - bin/usdcat
              - lib/python*/site-packages/pxr
              - Library/bin/usdcat.exe
              - Lib/site-packages/pxr
              - Library/lib/site-packages/pxr
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/pxrConfig.cmake"
              - test -f "$PREFIX/cmake/pxrTargets.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openusd_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\pxrConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_PREFIX%\cmake\pxrTargets.cmake" exit /b 1
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openusd_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openusd_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: openusd-minimal-tools
    inherit:
      from: openusd-minimal-build
      run_exports: false
    build:
      skip:
        - if: openusd_build_set != "minimal-cpp"
          then: true
      files:
        - bin/usd*
        - Library/bin/usd*.exe
    requirements:
      run:
        - ${{ pin_subpackage('openusd-minimal-lib', exact=True) }}
        - materialx-lib 1.39.*
        - opensubdiv-lib 3.7.*
        - tbb >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-python <0a0
    tests:
      - script:
          - if: unix
            then:
              - 'status=0; usdcat --help > usdcat-help.txt 2>&1 || status=$?; cat usdcat-help.txt; test "$status" -eq 1 && grep -F "Usage: usdcat" usdcat-help.txt'
          - if: win
            then:
              - usdcat --help
          - if: unix
            then:
              - test ! -e "$PREFIX/bin/usdview"
              - test ! -d "$PREFIX/lib/python/pxr"
          - if: win
            then:
              - if exist "%LIBRARY_BIN%\usdview.exe" exit /b 1
              - if exist "%LIBRARY_LIB%\python\pxr" exit /b 1

  - package:
      name: openusd-minimal-python
    inherit: openusd-minimal-python-build
    build:
      skip:
        - if: openusd_build_set != "minimal-python"
          then: true
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - "**"
    requirements:
      run:
        - materialx-dev 1.39.*
        - opensubdiv-dev 3.7.*
        - python
        - if: python == "3.14"
          then:
            - python_abi 3.14.* *_cp314
        - tbb-devel >=2022.3,<2023
      run_constraints:
        - openusd <0a0
        - openusd-minimal-lib <0a0
        - openusd-minimal-dev <0a0
        - openusd-minimal-tools <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('openusd-minimal-python', upper_bound='x.x') }}
    tests:
      - script:
          - if: unix
            then:
              - 'status=0; usdcat --help > usdcat-help.txt 2>&1 || status=$?; cat usdcat-help.txt; test "$status" -eq 1 && grep -F "Usage: usdcat" usdcat-help.txt'
          - if: win
            then:
              - usdcat --help
          - if: unix
            then:
              - test -f "$PREFIX/pxrConfig.cmake"
              - test -f "$PREFIX/cmake/pxrTargets.cmake"
              - test -d "$SP_DIR/pxr"
              - test ! -d "$PREFIX/lib/python/pxr"
              - test -f "$PREFIX/etc/conda/activate.d/openusd-minimal-python.sh"
              - PYTHONPATH= python -c "import os, pathlib, pxr; from pxr import Tf, Usd, UsdMtlx; root = pathlib.Path(os.environ['SP_DIR']).resolve(); location = pathlib.Path(pxr.__file__).resolve(); assert location.is_relative_to(root), (location, root); assert Usd.GetVersion()[1:] == (26, 8)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openusd_consumer
              - test ! -e "$PREFIX/bin/usdview"
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\pxrConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_PREFIX%\cmake\pxrTargets.cmake" exit /b 1
              - if not exist "%SP_DIR%\pxr" exit /b 1
              - if exist "%LIBRARY_LIB%\python\pxr" exit /b 1
              - if exist "%LIBRARY_LIB%\site-packages\pxr" exit /b 1
              - if not exist "%PREFIX%\etc\conda\activate.d\openusd-minimal-python.bat" exit /b 1
              - set "PYTHONPATH=" && python -c "import os, pathlib, pxr; from pxr import Tf, Usd, UsdMtlx; root = pathlib.Path(os.environ['SP_DIR']).resolve(); location = pathlib.Path(pxr.__file__).resolve(); assert location.is_relative_to(root), (location, root); assert Usd.GetVersion()[1:] == (26, 8)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openusd_consumer.exe
              - if exist "%LIBRARY_BIN%\usdview.exe" exit /b 1
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openusd_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - python

  - package:
