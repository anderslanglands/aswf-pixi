context:
  version: "26.08"
  build_number: 0

recipe:
  name: openusd
  version: ${{ version }}

source:
  url: https://github.com/PixarAnimationStudios/OpenUSD/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4bccbb95cddda1dbeef2f74a08b9456352f2aa91bfd4578c0c613009c7950149
  patches:
    - link-python-to-executables.patch
    - find-prefix-python-in-config.patch

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: openusd-minimal-build
    build:
      script:
        - if: unix
          then: |
            export CXXFLAGS="${CXXFLAGS//-fvisibility-inlines-hidden/}"
            export CXXFLAGS="${CXXFLAGS//-ffunction-sections/}"
            export CXXFLAGS="${CXXFLAGS//-pipe/}"
            export CFLAGS="${CFLAGS//-ffunction-sections/}"
            export CFLAGS="${CFLAGS//-pipe/}"

            detected_jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 1)"
            build_jobs="${OPENUSD_BUILD_PARALLEL_LEVEL:-${CMAKE_BUILD_PARALLEL_LEVEL:-$detected_jobs}}"
            case "$build_jobs" in
              ''|*[!0-9]*)
                echo "OpenUSD build parallelism must be an integer, got '$build_jobs'"
                exit 1
                ;;
            esac
            if [ "$build_jobs" -lt 1 ]; then
              echo "OpenUSD build parallelism must be at least 1, got '$build_jobs'"
              exit 1
            fi
            if [ "$build_jobs" -gt 24 ]; then
              echo "OpenUSD build parallelism capped at 24 from '$build_jobs'"
              build_jobs=24
            fi
            export CMAKE_BUILD_PARALLEL_LEVEL="$build_jobs"
            echo "OpenUSD build parallelism: $build_jobs"

            cmake -E rm -rf $SRC_DIR/../build-minimal

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DPXR_BUILD_MONOLITHIC=OFF \
              -DPXR_ENABLE_PYTHON_SUPPORT=OFF \
              -DPXR_BUILD_DOCUMENTATION=OFF \
              -DPXR_BUILD_HTML_DOCUMENTATION=OFF \
              -DPXR_BUILD_PYTHON_DOCUMENTATION=OFF \
              -DPXR_BUILD_TESTS=OFF \
              -DPXR_BUILD_EXAMPLES=OFF \
              -DPXR_BUILD_TUTORIALS=OFF \
              -DPXR_BUILD_USD_TOOLS=ON \
              -DPXR_BUILD_IMAGING=OFF \
              -DPXR_BUILD_USD_IMAGING=OFF \
              -DPXR_BUILD_EXEC=ON \
              -DPXR_BUILD_USD_VALIDATION=ON \
              -DPXR_BUILD_USDVIEW=OFF \
              -DPXR_ENABLE_GL_SUPPORT=OFF \
              -DPXR_ENABLE_METAL_SUPPORT=OFF \
              -DPXR_ENABLE_VULKAN_SUPPORT=OFF \
              -DPXR_BUILD_OPENIMAGEIO_PLUGIN=OFF \
              -DPXR_BUILD_OPENCOLORIO_PLUGIN=OFF \
              -DPXR_BUILD_IMAGEIO_PLUGIN=OFF \
              -DPXR_BUILD_ALEMBIC_PLUGIN=OFF \
              -DPXR_BUILD_DRACO_PLUGIN=OFF \
              -DPXR_BUILD_PRMAN_PLUGIN=OFF \
              -DPXR_BUILD_EMBREE_PLUGIN=OFF \
              -DPXR_ENABLE_MATERIALX_SUPPORT=ON \
              -DPXR_ENABLE_OSL_SUPPORT=OFF \
              -DPXR_ENABLE_PTEX_SUPPORT=OFF \
              -DPXR_ENABLE_OPENVDB_SUPPORT=OFF \
              -DPXR_ENABLE_HDF5_SUPPORT=OFF \
              -DPXR_BUILD_MAYAPY_TESTS=OFF \
              -DPXR_BUILD_ANIMX_TESTS=OFF \
              -DPXR_STRICT_BUILD_MODE=OFF \
              -DPXR_VALIDATE_GENERATED_CODE=OFF \
              -DPXR_ENABLE_PRECOMPILED_HEADERS=OFF \
              -DPXR_FIND_TBB_IN_CONFIG=ON \
              -DTBB_ROOT=$PREFIX \
              -DTBB_ROOT_DIR=$PREFIX \
              -DOpenSubdiv_ROOT=$PREFIX \
              -DOPENSUBDIV_ROOT_DIR=$PREFIX \
              -DMaterialX_ROOT=$PREFIX \
              -B $SRC_DIR/../build-minimal \
              -S .

            cmake --build $SRC_DIR/../build-minimal --target install --parallel "$build_jobs"

            mkdir -p "$PREFIX/etc/conda/activate.d" "$PREFIX/etc/conda/deactivate.d"
            cat > "$PREFIX/etc/conda/activate.d/openusd-minimal-lib.sh" <<'EOF'
            if [ -z "${_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET:-}" ]; then
              export _OPENUSD_MINIMAL_LIB_PLUGINPATH_SET=1
              if [ -n "${PXR_PLUGINPATH_NAME+x}" ]; then
                export _OPENUSD_MINIMAL_LIB_OLD_PLUGINPATH="${PXR_PLUGINPATH_NAME}"
                export PXR_PLUGINPATH_NAME="${CONDA_PREFIX}/lib/usd:${PXR_PLUGINPATH_NAME}"
              else
                unset _OPENUSD_MINIMAL_LIB_OLD_PLUGINPATH
                export PXR_PLUGINPATH_NAME="${CONDA_PREFIX}/lib/usd"
              fi
            fi
            EOF

            cat > "$PREFIX/etc/conda/deactivate.d/openusd-minimal-lib.sh" <<'EOF'
            if [ -n "${_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET:-}" ]; then
              if [ -n "${_OPENUSD_MINIMAL_LIB_OLD_PLUGINPATH+x}" ]; then
                export PXR_PLUGINPATH_NAME="${_OPENUSD_MINIMAL_LIB_OLD_PLUGINPATH}"
              else
                unset PXR_PLUGINPATH_NAME
              fi
              unset _OPENUSD_MINIMAL_LIB_PLUGINPATH_SET
              unset _OPENUSD_MINIMAL_LIB_OLD_PLUGINPATH
            fi
            EOF
          else: |
            set "CL=/utf-8 %CL%"
            set "CXXFLAGS=%CXXFLAGS% /utf-8"
            set "LIBRARY_PREFIX_FWD=%LIBRARY_PREFIX:\=/%"
            setlocal EnableDelayedExpansion

            if "%OPENUSD_BUILD_PARALLEL_LEVEL%"=="" (
              if "%CMAKE_BUILD_PARALLEL_LEVEL%"=="" (
                set "BUILD_JOBS=%NUMBER_OF_PROCESSORS%"
              ) else (
                set "BUILD_JOBS=%CMAKE_BUILD_PARALLEL_LEVEL%"
              )
            ) else (
              set "BUILD_JOBS=%OPENUSD_BUILD_PARALLEL_LEVEL%"
            )
            echo !BUILD_JOBS!| findstr /R "^[1-9][0-9]*$" >nul
            if errorlevel 1 (
              echo OpenUSD build parallelism must be an integer, got '!BUILD_JOBS!'
              exit /b 1
            )
            if !BUILD_JOBS! LSS 1 (
              echo OpenUSD build parallelism must be at least 1, got '!BUILD_JOBS!'
              exit /b 1
            )
            if !BUILD_JOBS! GTR 24 (
              echo OpenUSD build parallelism capped at 24 from '!BUILD_JOBS!'
              set "BUILD_JOBS=24"
            )
            set "CMAKE_BUILD_PARALLEL_LEVEL=!BUILD_JOBS!"
            echo OpenUSD build parallelism: !BUILD_JOBS!

            cmake -E rm -rf %SRC_DIR%\..\build-minimal

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX_FWD% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DPXR_BUILD_MONOLITHIC=OFF ^
              -DPXR_ENABLE_PYTHON_SUPPORT=OFF ^
              -DPXR_BUILD_DOCUMENTATION=OFF ^
              -DPXR_BUILD_HTML_DOCUMENTATION=OFF ^
              -DPXR_BUILD_PYTHON_DOCUMENTATION=OFF ^
              -DPXR_BUILD_TESTS=OFF ^
              -DPXR_BUILD_EXAMPLES=OFF ^
              -DPXR_BUILD_TUTORIALS=OFF ^
              -DPXR_BUILD_USD_TOOLS=ON ^
              -DPXR_BUILD_IMAGING=OFF ^
              -DPXR_BUILD_USD_IMAGING=OFF ^
              -DPXR_BUILD_EXEC=ON ^
              -DPXR_BUILD_USD_VALIDATION=ON ^
              -DPXR_BUILD_USDVIEW=OFF ^
              -DPXR_ENABLE_GL_SUPPORT=OFF ^
              -DPXR_ENABLE_METAL_SUPPORT=OFF ^
              -DPXR_ENABLE_VULKAN_SUPPORT=OFF ^
              -DPXR_BUILD_OPENIMAGEIO_PLUGIN=OFF ^
              -DPXR_BUILD_OPENCOLORIO_PLUGIN=OFF ^
              -DPXR_BUILD_IMAGEIO_PLUGIN=OFF ^
              -DPXR_BUILD_ALEMBIC_PLUGIN=OFF ^
              -DPXR_BUILD_DRACO_PLUGIN=OFF ^
              -DPXR_BUILD_PRMAN_PLUGIN=OFF ^
              -DPXR_BUILD_EMBREE_PLUGIN=OFF ^
              -DPXR_ENABLE_MATERIALX_SUPPORT=ON ^
              -DPXR_ENABLE_OSL_SUPPORT=OFF ^
              -DPXR_ENABLE_PTEX_SUPPORT=OFF ^
              -DPXR_ENABLE_OPENVDB_SUPPORT=OFF ^
              -DPXR_ENABLE_HDF5_SUPPORT=OFF ^
              -DPXR_BUILD_MAYAPY_TESTS=OFF ^
              -DPXR_BUILD_ANIMX_TESTS=OFF ^
              -DPXR_STRICT_BUILD_MODE=OFF ^
              -DPXR_VALIDATE_GENERATED_CODE=OFF ^
              -DPXR_ENABLE_PRECOMPILED_HEADERS=OFF ^
              -DPXR_FIND_TBB_IN_CONFIG=ON ^
              -DTBB_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DTBB_ROOT_DIR=%LIBRARY_PREFIX_FWD% ^
              -DOpenSubdiv_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DOPENSUBDIV_ROOT_DIR=%LIBRARY_PREFIX_FWD% ^
              -DMaterialX_ROOT=%LIBRARY_PREFIX_FWD% ^
              -B %SRC_DIR%\..\build-minimal ^
              -S .
            if %ERRORLEVEL% neq 0 exit /b 1

            cmake --build %SRC_DIR%\..\build-minimal --target install --config Release --parallel !BUILD_JOBS!
            if %ERRORLEVEL% neq 0 exit /b 1

            rem Normalize generated metadata so rattler-build does not see mixed slash forms of %%PREFIX%%.
            powershell -NoProfile -ExecutionPolicy Bypass -Command "$ErrorActionPreference = 'Stop'; $prefixFwd = $env:PREFIX -replace '\\', '/'; $prefixPattern = (($env:PREFIX -split '\\') | ForEach-Object { [regex]::Escape($_) }) -join '[\\/]'; $files = @(); $config = Join-Path $env:LIBRARY_PREFIX 'pxrConfig.cmake'; if (Test-Path $config) { $files += Get-Item $config }; $cmakeDir = Join-Path $env:LIBRARY_PREFIX 'cmake'; if (Test-Path $cmakeDir) { $files += Get-ChildItem -Path $cmakeDir -Filter '*.cmake' -Recurse -File }; foreach ($file in $files) { $text = [IO.File]::ReadAllText($file.FullName); $text = [regex]::Replace($text, $prefixPattern, $prefixFwd); $text = $text.Replace($prefixFwd + [char]92, $prefixFwd + '/'); [IO.File]::WriteAllText($file.FullName, $text) }"

            if not exist "%PREFIX%\etc\conda\activate.d" mkdir "%PREFIX%\etc\conda\activate.d"
            if not exist "%PREFIX%\etc\conda\deactivate.d" mkdir "%PREFIX%\etc\conda\deactivate.d"
            (
              echo @echo off
              echo if not defined CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH ^(
              echo   set "CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH=%%PATH%%"
              echo   set "PATH=%%CONDA_PREFIX%%\Library\lib;%%PATH%%"
              echo ^)
              echo if not defined CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET ^(
              echo   set "CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET=1"
              echo   if defined PXR_PLUGINPATH_NAME ^(
              echo     set "CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME=%%PXR_PLUGINPATH_NAME%%"
              echo     set "PXR_PLUGINPATH_NAME=%%CONDA_PREFIX%%\Library\lib\usd;%%PXR_PLUGINPATH_NAME%%"
              echo   ^) else ^(
              echo     set "CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME="
              echo     set "PXR_PLUGINPATH_NAME=%%CONDA_PREFIX%%\Library\lib\usd"
              echo   ^)
              echo ^)
            ) > "%PREFIX%\etc\conda\activate.d\openusd-minimal-lib.bat"
            (
              echo if ^(-not ^(Test-Path Env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH^)^) {
              echo   $env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH = $env:PATH
              echo   $env:PATH = "$env:CONDA_PREFIX\Library\lib;$env:PATH"
              echo }
              echo if ^(-not ^(Test-Path Env:CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET^)^) {
              echo   $env:CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET = "1"
              echo   if ^(Test-Path Env:PXR_PLUGINPATH_NAME^) {
              echo     $env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME = $env:PXR_PLUGINPATH_NAME
              echo     $env:PXR_PLUGINPATH_NAME = "$env:CONDA_PREFIX\Library\lib\usd;$env:PXR_PLUGINPATH_NAME"
              echo   } else {
              echo     Remove-Item Env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME -ErrorAction SilentlyContinue
              echo     $env:PXR_PLUGINPATH_NAME = "$env:CONDA_PREFIX\Library\lib\usd"
              echo   }
              echo }
            ) > "%PREFIX%\etc\conda\activate.d\openusd-minimal-lib.ps1"
            (
              echo @echo off
              echo if defined CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH ^(
              echo   set "PATH=%%CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH%%"
              echo ^)
              echo set "CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH="
              echo if defined CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET ^(
              echo   if defined CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME ^(
              echo     set "PXR_PLUGINPATH_NAME=%%CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME%%"
              echo   ^) else ^(
              echo     set "PXR_PLUGINPATH_NAME="
              echo   ^)
              echo   set "CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME="
              echo   set "CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET="
              echo ^)
            ) > "%PREFIX%\etc\conda\deactivate.d\openusd-minimal-lib.bat"
            (
              echo if ^(Test-Path Env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH^) {
              echo   $env:PATH = $env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH
              echo   Remove-Item Env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PATH -ErrorAction SilentlyContinue
              echo }
              echo if ^(Test-Path Env:CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET^) {
              echo   if ^(Test-Path Env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME^) {
              echo     $env:PXR_PLUGINPATH_NAME = $env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME
              echo     Remove-Item Env:CONDA_BACKUP_OPENUSD_MINIMAL_LIB_PLUGINPATH_NAME -ErrorAction SilentlyContinue
              echo   } else {
              echo     Remove-Item Env:PXR_PLUGINPATH_NAME -ErrorAction SilentlyContinue
              echo   }
              echo   Remove-Item Env:CONDA_OPENUSD_MINIMAL_LIB_PLUGINPATH_SET -ErrorAction SilentlyContinue
              echo }
            ) > "%PREFIX%\etc\conda\deactivate.d\openusd-minimal-lib.ps1"
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
      host:
        - materialx-dev 1.39.*
        - opensubdiv 3.7.*
        - tbb-devel >=2022.3,<2023

  - staging:
      name: openusd-minimal-python-build
    build:
      script:
        - if: unix
          then: |
            export CXXFLAGS="${CXXFLAGS//-fvisibility-inlines-hidden/}"
            export CXXFLAGS="${CXXFLAGS//-ffunction-sections/}"
            export CXXFLAGS="${CXXFLAGS//-pipe/}"
            export CFLAGS="${CFLAGS//-ffunction-sections/}"
            export CFLAGS="${CFLAGS//-pipe/}"

            detected_jobs="$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 1)"
            build_jobs="${OPENUSD_BUILD_PARALLEL_LEVEL:-${CMAKE_BUILD_PARALLEL_LEVEL:-$detected_jobs}}"
            case "$build_jobs" in
              ''|*[!0-9]*)
                echo "OpenUSD build parallelism must be an integer, got '$build_jobs'"
                exit 1
                ;;
            esac
            if [ "$build_jobs" -lt 1 ]; then
              echo "OpenUSD build parallelism must be at least 1, got '$build_jobs'"
              exit 1
            fi
            if [ "$build_jobs" -gt 24 ]; then
              echo "OpenUSD build parallelism capped at 24 from '$build_jobs'"
              build_jobs=24
            fi
            export CMAKE_BUILD_PARALLEL_LEVEL="$build_jobs"
            echo "OpenUSD build parallelism: $build_jobs"

            py_undefined_dynamic_lookup=OFF
            case "${target_platform:-}" in
              osx-*) py_undefined_dynamic_lookup=ON ;;
            esac
            echo "OpenUSD Python undefined dynamic lookup: $py_undefined_dynamic_lookup"

            cmake -E rm -rf $SRC_DIR/../build-minimal-python

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DPXR_BUILD_MONOLITHIC=OFF \
              -DPXR_ENABLE_PYTHON_SUPPORT=ON \
              -DPXR_PY_UNDEFINED_DYNAMIC_LOOKUP=$py_undefined_dynamic_lookup \
              -DPXR_BUILD_DOCUMENTATION=OFF \
              -DPXR_BUILD_HTML_DOCUMENTATION=OFF \
              -DPXR_BUILD_PYTHON_DOCUMENTATION=OFF \
              -DPXR_BUILD_TESTS=OFF \
              -DPXR_BUILD_EXAMPLES=OFF \
              -DPXR_BUILD_TUTORIALS=OFF \
              -DPXR_BUILD_USD_TOOLS=ON \
              -DPXR_BUILD_IMAGING=OFF \
              -DPXR_BUILD_USD_IMAGING=OFF \
              -DPXR_BUILD_EXEC=ON \
              -DPXR_BUILD_USD_VALIDATION=ON \
              -DPXR_BUILD_USDVIEW=OFF \
              -DPXR_ENABLE_GL_SUPPORT=OFF \
              -DPXR_ENABLE_METAL_SUPPORT=OFF \
              -DPXR_ENABLE_VULKAN_SUPPORT=OFF \
              -DPXR_BUILD_OPENIMAGEIO_PLUGIN=OFF \
              -DPXR_BUILD_OPENCOLORIO_PLUGIN=OFF \
              -DPXR_BUILD_IMAGEIO_PLUGIN=OFF \
              -DPXR_BUILD_ALEMBIC_PLUGIN=OFF \
              -DPXR_BUILD_DRACO_PLUGIN=OFF \
              -DPXR_BUILD_PRMAN_PLUGIN=OFF \
              -DPXR_BUILD_EMBREE_PLUGIN=OFF \
              -DPXR_ENABLE_MATERIALX_SUPPORT=ON \
              -DPXR_ENABLE_OSL_SUPPORT=OFF \
              -DPXR_ENABLE_PTEX_SUPPORT=OFF \
              -DPXR_ENABLE_OPENVDB_SUPPORT=OFF \
              -DPXR_ENABLE_HDF5_SUPPORT=OFF \
              -DPXR_BUILD_MAYAPY_TESTS=OFF \
              -DPXR_BUILD_ANIMX_TESTS=OFF \
              -DPXR_STRICT_BUILD_MODE=OFF \
              -DPXR_VALIDATE_GENERATED_CODE=OFF \
              -DPXR_ENABLE_PRECOMPILED_HEADERS=OFF \
              -DPXR_FIND_TBB_IN_CONFIG=ON \
              -DTBB_ROOT=$PREFIX \
              -DTBB_ROOT_DIR=$PREFIX \
              -DOpenSubdiv_ROOT=$PREFIX \
              -DOPENSUBDIV_ROOT_DIR=$PREFIX \
              -DMaterialX_ROOT=$PREFIX \
              -DPython3_EXECUTABLE=$PYTHON \
              -DPython3_ROOT_DIR=$PREFIX \
              -DPython3_FIND_STRATEGY=LOCATION \
              -DPython3_FIND_REGISTRY=NEVER \
              -DPython3_FIND_FRAMEWORK=NEVER \
              -DPXR_PYTHON_INSTALL_DIR=$SP_DIR \
              -DPXR_PYTHON_SHEBANG=$PYTHON \
              -B $SRC_DIR/../build-minimal-python \
              -S .

            cmake --build $SRC_DIR/../build-minimal-python --target install --parallel "$build_jobs"

            mkdir -p "$PREFIX/etc/conda/activate.d" "$PREFIX/etc/conda/deactivate.d"
            cat > "$PREFIX/etc/conda/activate.d/openusd-minimal-python.sh" <<'EOF'
            if [ -z "${_OPENUSD_PLUGINPATH_SET:-}" ]; then
              export _OPENUSD_PLUGINPATH_SET=1
              if [ -n "${PXR_PLUGINPATH_NAME+x}" ]; then
                export _OPENUSD_OLD_PLUGINPATH="${PXR_PLUGINPATH_NAME}"
                export PXR_PLUGINPATH_NAME="${CONDA_PREFIX}/lib/usd:${PXR_PLUGINPATH_NAME}"
              else
                unset _OPENUSD_OLD_PLUGINPATH
                export PXR_PLUGINPATH_NAME="${CONDA_PREFIX}/lib/usd"
              fi
            fi
            EOF

            cat > "$PREFIX/etc/conda/deactivate.d/openusd-minimal-python.sh" <<'EOF'
            if [ -n "${_OPENUSD_PLUGINPATH_SET:-}" ]; then
              if [ -n "${_OPENUSD_OLD_PLUGINPATH+x}" ]; then
                export PXR_PLUGINPATH_NAME="${_OPENUSD_OLD_PLUGINPATH}"
              else
                unset PXR_PLUGINPATH_NAME
              fi
              unset _OPENUSD_PLUGINPATH_SET
              unset _OPENUSD_OLD_PLUGINPATH
            fi
            EOF
          else: |
            set "CL=/utf-8 %CL%"
            set "CXXFLAGS=%CXXFLAGS% /utf-8"
            set "LIBRARY_PREFIX_FWD=%LIBRARY_PREFIX:\=/%"
            setlocal EnableDelayedExpansion

            if "%OPENUSD_BUILD_PARALLEL_LEVEL%"=="" (
              if "%CMAKE_BUILD_PARALLEL_LEVEL%"=="" (
                set "BUILD_JOBS=%NUMBER_OF_PROCESSORS%"
              ) else (
                set "BUILD_JOBS=%CMAKE_BUILD_PARALLEL_LEVEL%"
              )
            ) else (
              set "BUILD_JOBS=%OPENUSD_BUILD_PARALLEL_LEVEL%"
            )
            echo !BUILD_JOBS!| findstr /R "^[1-9][0-9]*$" >nul
            if errorlevel 1 (
              echo OpenUSD build parallelism must be an integer, got '!BUILD_JOBS!'
              exit /b 1
            )
            if !BUILD_JOBS! LSS 1 (
              echo OpenUSD build parallelism must be at least 1, got '!BUILD_JOBS!'
              exit /b 1
            )
            if !BUILD_JOBS! GTR 24 (
              echo OpenUSD build parallelism capped at 24 from '!BUILD_JOBS!'
              set "BUILD_JOBS=24"
            )
            set "CMAKE_BUILD_PARALLEL_LEVEL=!BUILD_JOBS!"
            echo OpenUSD build parallelism: !BUILD_JOBS!

            cmake -E rm -rf %SRC_DIR%\..\build-minimal-python

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX_FWD% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DPXR_BUILD_MONOLITHIC=OFF ^
              -DPXR_ENABLE_PYTHON_SUPPORT=ON ^
              -DPXR_PY_UNDEFINED_DYNAMIC_LOOKUP=OFF ^
              -DPXR_BUILD_DOCUMENTATION=OFF ^
              -DPXR_BUILD_HTML_DOCUMENTATION=OFF ^
              -DPXR_BUILD_PYTHON_DOCUMENTATION=OFF ^
              -DPXR_BUILD_TESTS=OFF ^
              -DPXR_BUILD_EXAMPLES=OFF ^
              -DPXR_BUILD_TUTORIALS=OFF ^
              -DPXR_BUILD_USD_TOOLS=ON ^
              -DPXR_BUILD_IMAGING=OFF ^
              -DPXR_BUILD_USD_IMAGING=OFF ^
              -DPXR_BUILD_EXEC=ON ^
              -DPXR_BUILD_USD_VALIDATION=ON ^
              -DPXR_BUILD_USDVIEW=OFF ^
              -DPXR_ENABLE_GL_SUPPORT=OFF ^
              -DPXR_ENABLE_METAL_SUPPORT=OFF ^
              -DPXR_ENABLE_VULKAN_SUPPORT=OFF ^
              -DPXR_BUILD_OPENIMAGEIO_PLUGIN=OFF ^
              -DPXR_BUILD_OPENCOLORIO_PLUGIN=OFF ^
              -DPXR_BUILD_IMAGEIO_PLUGIN=OFF ^
              -DPXR_BUILD_ALEMBIC_PLUGIN=OFF ^
              -DPXR_BUILD_DRACO_PLUGIN=OFF ^
              -DPXR_BUILD_PRMAN_PLUGIN=OFF ^
              -DPXR_BUILD_EMBREE_PLUGIN=OFF ^
              -DPXR_ENABLE_MATERIALX_SUPPORT=ON ^
              -DPXR_ENABLE_OSL_SUPPORT=OFF ^
              -DPXR_ENABLE_PTEX_SUPPORT=OFF ^
              -DPXR_ENABLE_OPENVDB_SUPPORT=OFF ^
              -DPXR_ENABLE_HDF5_SUPPORT=OFF ^
              -DPXR_BUILD_MAYAPY_TESTS=OFF ^
              -DPXR_BUILD_ANIMX_TESTS=OFF ^
              -DPXR_STRICT_BUILD_MODE=OFF ^
              -DPXR_VALIDATE_GENERATED_CODE=OFF ^
              -DPXR_ENABLE_PRECOMPILED_HEADERS=OFF ^
              -DPXR_FIND_TBB_IN_CONFIG=ON ^
              -DTBB_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DTBB_ROOT_DIR=%LIBRARY_PREFIX_FWD% ^
              -DOpenSubdiv_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DOPENSUBDIV_ROOT_DIR=%LIBRARY_PREFIX_FWD% ^
              -DMaterialX_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DPython3_EXECUTABLE=%PYTHON% ^
              -DPython3_ROOT_DIR=%PREFIX% ^
              -DPython3_FIND_STRATEGY=LOCATION ^
              -DPython3_FIND_REGISTRY=NEVER ^
              -DPython3_FIND_FRAMEWORK=NEVER ^
