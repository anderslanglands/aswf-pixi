              - test -f "$PREFIX/etc/conda/activate.d/openusd.sh"
              - PYTHONPATH= python -c "import os, pathlib, pxr; from pxr import Tf, Usd, UsdImagingGL, UsdMtlx; root = pathlib.Path(os.environ['SP_DIR']).resolve(); location = pathlib.Path(pxr.__file__).resolve(); assert location.is_relative_to(root), (location, root); assert Usd.GetVersion()[1:] == (26, 8)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openusd_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_PREFIX%\pxrConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_PREFIX%\cmake\pxrTargets.cmake" exit /b 1
              - if not exist "%SP_DIR%\pxr" exit /b 1
              - if exist "%LIBRARY_LIB%\python\pxr" exit /b 1
              - if exist "%LIBRARY_LIB%\site-packages\pxr" exit /b 1
              - if not exist "%LIBRARY_BIN%\usdview" if not exist "%LIBRARY_BIN%\usdview.cmd" if not exist "%LIBRARY_BIN%\usdview.exe" exit /b 1
              - if not exist "%PREFIX%\etc\conda\activate.d\openusd.bat" exit /b 1
              - set "PYTHONPATH=" && python -c "import os, pathlib, pxr; from pxr import Tf, Usd, UsdImagingGL, UsdMtlx; root = pathlib.Path(os.environ['SP_DIR']).resolve(); location = pathlib.Path(pxr.__file__).resolve(); assert location.is_relative_to(root), (location, root); assert Usd.GetVersion()[1:] == (26, 8)"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openusd_consumer.exe
        files:
