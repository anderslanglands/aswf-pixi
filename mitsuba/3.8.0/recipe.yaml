context:
  version: "3.8.0"
  build_number: 0
  variants: "scalar_rgb,scalar_spectral,scalar_spectral_polarized,llvm_ad_rgb,llvm_ad_mono,llvm_ad_mono_polarized,llvm_ad_spectral,llvm_ad_spectral_polarized,cuda_ad_rgb,cuda_ad_mono,cuda_ad_mono_polarized,cuda_ad_spectral,cuda_ad_spectral_polarized"
  non_cuda_variants: "scalar_rgb,scalar_spectral,scalar_spectral_polarized,llvm_ad_rgb,llvm_ad_mono,llvm_ad_mono_polarized,llvm_ad_spectral,llvm_ad_spectral_polarized"
  drjit_version: "1.3.1"
  llvm_major: "22"

recipe:
  name: mitsuba
  version: ${{ version }}

source:
  git: https://github.com/mitsuba-renderer/mitsuba3.git
  rev: 2ba361481801f6e158bbab2b64345f6778bd2865
  submodules: true

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: mitsuba-python-build
    build:
      script:
        - if: unix
          then: |
            export CMAKE_GENERATOR=Ninja
            MITSUBA_VARIANTS="${{ variants }}"
            DRJIT_ENABLE_CUDA=ON
            if [ "$(uname)" = "Darwin" ]; then
              MITSUBA_VARIANTS="${{ non_cuda_variants }}"
              DRJIT_ENABLE_CUDA=OFF
            fi
            if [ -f "$PREFIX/lib/libLLVM-${{ llvm_major }}.so" ]; then
              export DRJIT_LIBLLVM_PATH="$PREFIX/lib/libLLVM-${{ llvm_major }}.so"
            elif [ -f "$PREFIX/lib/libLLVM.so" ]; then
              export DRJIT_LIBLLVM_PATH="$PREFIX/lib/libLLVM.so"
            elif [ -f "$PREFIX/lib/libLLVM-${{ llvm_major }}.dylib" ]; then
              export DRJIT_LIBLLVM_PATH="$PREFIX/lib/libLLVM-${{ llvm_major }}.dylib"
            elif [ -f "$PREFIX/lib/libLLVM.dylib" ]; then
              export DRJIT_LIBLLVM_PATH="$PREFIX/lib/libLLVM.dylib"
            else
              echo "Could not find libLLVM in $PREFIX/lib" >&2
              exit 1
            fi
            python -m pip install ./ext/nanobind \
              --verbose \
              --no-deps \
              --no-build-isolation
            cmake -S ext/drjit -B build-drjit \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$SP_DIR" \
              -DPython_EXECUTABLE="$PYTHON" \
              -DPython3_EXECUTABLE="$PYTHON" \
              -DPython_FIND_REGISTRY=NEVER \
              -DPython3_FIND_REGISTRY=NEVER \
              -DDRJIT_ENABLE_LLVM=ON \
              -DDRJIT_ENABLE_CUDA="$DRJIT_ENABLE_CUDA" \
              -DDRJIT_ENABLE_AUTODIFF=ON \
              -DDRJIT_ENABLE_PYTHON=ON \
              -DDRJIT_ENABLE_TESTS=OFF \
              -DDRJIT_ENABLE_LEAK_WARNINGS=OFF
            cmake --build build-drjit --target install --parallel "$CPU_COUNT"
            WHEEL_TAG=$(python -c 'import sys, sysconfig; v=sys.version_info; p=sysconfig.get_platform().replace("-", "_").replace(".", "_"); print("cp%d%d-cp%d%d-%s" % (v.major, v.minor, v.major, v.minor, p))')
            mkdir -p "build/$WHEEL_TAG/python"
            rm -rf "build/$WHEEL_TAG/python/drjit"
            ln -sfn "$SP_DIR/drjit" "build/$WHEEL_TAG/python/drjit"
            export PYTHONPATH="$SP_DIR${PYTHONPATH:+:$PYTHONPATH}"
            python -m pip install . \
              --verbose \
              --no-deps \
              --no-build-isolation \
              --config-settings=cmake.args="-DMI_DEFAULT_VARIANTS=$MITSUBA_VARIANTS" \
              --config-settings=cmake.args="-DMI_DRJIT_CMAKE_DIR=$SP_DIR/share/cmake/drjit"
            python -c "import os; from pathlib import Path; metas=list(Path(os.environ['SP_DIR']).glob('mitsuba-*.dist-info/METADATA')); assert metas; [p.write_text(''.join(line for line in p.read_text().splitlines(True) if not line.startswith('Requires-Dist: drjit'))) for p in metas]"
            python -m pip uninstall -y nanobind
            mkdir -p "$PREFIX/etc/conda/activate.d" "$PREFIX/etc/conda/deactivate.d"
            cat > "$PREFIX/etc/conda/activate.d/mitsuba-drjit-llvm.sh" <<"EOF"
            if [ -n "${DRJIT_LIBLLVM_PATH+x}" ]; then
                export CONDA_BACKUP_DRJIT_LIBLLVM_PATH="$DRJIT_LIBLLVM_PATH"
            else
                unset CONDA_BACKUP_DRJIT_LIBLLVM_PATH
            fi
            if [ -f "$CONDA_PREFIX/lib/libLLVM-${{ llvm_major }}.so" ]; then
                export DRJIT_LIBLLVM_PATH="$CONDA_PREFIX/lib/libLLVM-${{ llvm_major }}.so"
            elif [ -f "$CONDA_PREFIX/lib/libLLVM.so" ]; then
                export DRJIT_LIBLLVM_PATH="$CONDA_PREFIX/lib/libLLVM.so"
            elif [ -f "$CONDA_PREFIX/lib/libLLVM-${{ llvm_major }}.dylib" ]; then
                export DRJIT_LIBLLVM_PATH="$CONDA_PREFIX/lib/libLLVM-${{ llvm_major }}.dylib"
            elif [ -f "$CONDA_PREFIX/lib/libLLVM.dylib" ]; then
                export DRJIT_LIBLLVM_PATH="$CONDA_PREFIX/lib/libLLVM.dylib"
            fi
            EOF
            cat > "$PREFIX/etc/conda/deactivate.d/mitsuba-drjit-llvm.sh" <<"EOF"
            if [ -n "${CONDA_BACKUP_DRJIT_LIBLLVM_PATH+x}" ]; then
                export DRJIT_LIBLLVM_PATH="$CONDA_BACKUP_DRJIT_LIBLLVM_PATH"
                unset CONDA_BACKUP_DRJIT_LIBLLVM_PATH
            else
                unset DRJIT_LIBLLVM_PATH
            fi
            EOF
            cat > "$PREFIX/bin/mitsuba" <<"EOF"
            #!/bin/sh
            set -e
            _this_dir=$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)
            _prefix=$(CDPATH= cd -- "$_this_dir/.." && pwd)
            if [ -z "${DRJIT_LIBLLVM_PATH+x}" ]; then
                if [ -f "$_prefix/lib/libLLVM-${{ llvm_major }}.so" ]; then
                    export DRJIT_LIBLLVM_PATH="$_prefix/lib/libLLVM-${{ llvm_major }}.so"
                elif [ -f "$_prefix/lib/libLLVM.so" ]; then
                    export DRJIT_LIBLLVM_PATH="$_prefix/lib/libLLVM.so"
                elif [ -f "$_prefix/lib/libLLVM-${{ llvm_major }}.dylib" ]; then
                    export DRJIT_LIBLLVM_PATH="$_prefix/lib/libLLVM-${{ llvm_major }}.dylib"
                elif [ -f "$_prefix/lib/libLLVM.dylib" ]; then
                    export DRJIT_LIBLLVM_PATH="$_prefix/lib/libLLVM.dylib"
                fi
            fi
            exec "$_prefix/bin/python" -c 'import sys; from mitsuba.cli import _main; sys.argv[0] = "mitsuba"; raise SystemExit(_main())' "$@"
            EOF
            chmod +x "$PREFIX/bin/mitsuba"
          else: |
            set CMAKE_GENERATOR=Ninja
            set CMAKE_GENERATOR_PLATFORM=
            set CMAKE_GENERATOR_TOOLSET=
            set "MITSUBA_VARIANTS=${{ non_cuda_variants }}"
            if exist "%PREFIX%\Library\bin\LLVM-C.dll" set "DRJIT_LIBLLVM_PATH=%PREFIX%\Library\bin\LLVM-C.dll"
            if exist "%PREFIX%\Library\bin\LLVM.dll" set "DRJIT_LIBLLVM_PATH=%PREFIX%\Library\bin\LLVM.dll"
            if not defined DRJIT_LIBLLVM_PATH (
              echo Could not find LLVM-C.dll or LLVM.dll in "%PREFIX%\Library\bin"
              exit /b 1
            )
            python -m pip install ./ext/nanobind ^
              --verbose ^
              --no-deps ^
              --no-build-isolation
            if errorlevel 1 exit /b 1
            cmake -S ext/drjit -B build-drjit ^
              -G Ninja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX="%SP_DIR%" ^
              -DPython_EXECUTABLE="%PYTHON%" ^
              -DPython3_EXECUTABLE="%PYTHON%" ^
              -DPython_FIND_REGISTRY=NEVER ^
              -DPython3_FIND_REGISTRY=NEVER ^
              -DDRJIT_ENABLE_LLVM=ON ^
              -DDRJIT_ENABLE_CUDA=OFF ^
              -DDRJIT_ENABLE_AUTODIFF=ON ^
              -DDRJIT_ENABLE_PYTHON=ON ^
              -DDRJIT_ENABLE_TESTS=OFF ^
              -DDRJIT_ENABLE_LEAK_WARNINGS=OFF
            if errorlevel 1 exit /b 1
            cmake --build build-drjit --target install --parallel "%CPU_COUNT%"
            if errorlevel 1 exit /b 1
            for /f "usebackq" %%i in (`python -c "import sys, sysconfig; print(f'cp{sys.version_info.major}{sys.version_info.minor}-cp{sys.version_info.major}{sys.version_info.minor}-{sysconfig.get_platform().replace(chr(45), chr(95)).replace(chr(46), chr(95))}')"`) do set "WHEEL_TAG=%%i"
            if not defined WHEEL_TAG exit /b 1
            if not exist "build\%WHEEL_TAG%\python" mkdir "build\%WHEEL_TAG%\python"
            if exist "build\%WHEEL_TAG%\python\drjit" rmdir /S /Q "build\%WHEEL_TAG%\python\drjit"
            xcopy /E /I /Y "%SP_DIR%\drjit" "build\%WHEEL_TAG%\python\drjit"
            if errorlevel 1 exit /b 1
            set "PYTHONPATH=%SP_DIR%;%PYTHONPATH%"
            python -m pip install . ^
              --verbose ^
              --no-deps ^
              --no-build-isolation ^
              --config-settings=cmake.args="-DMI_DEFAULT_VARIANTS=%MITSUBA_VARIANTS%" ^
              --config-settings=cmake.args="-DMI_DRJIT_CMAKE_DIR=%SP_DIR%/share/cmake/drjit"
            if errorlevel 1 exit /b 1
            python -c "import os; from pathlib import Path; metas=list(Path(os.environ['SP_DIR']).glob('mitsuba-*.dist-info/METADATA')); assert metas; [p.write_text(''.join(line for line in p.read_text().splitlines(True) if not line.startswith('Requires-Dist: drjit'))) for p in metas]"
            if errorlevel 1 exit /b 1
            python -m pip uninstall -y nanobind
            if errorlevel 1 exit /b 1
            if not exist "%PREFIX%\etc\conda\activate.d" mkdir "%PREFIX%\etc\conda\activate.d"
            if not exist "%PREFIX%\etc\conda\deactivate.d" mkdir "%PREFIX%\etc\conda\deactivate.d"
            (
              echo if defined DRJIT_LIBLLVM_PATH ^(
              echo   set "CONDA_BACKUP_DRJIT_LIBLLVM_PATH=%%DRJIT_LIBLLVM_PATH%%"
              echo ^) else ^(
              echo   set "CONDA_BACKUP_DRJIT_LIBLLVM_PATH="
              echo ^)
              echo if exist "%%CONDA_PREFIX%%\Library\bin\LLVM-C.dll" set "DRJIT_LIBLLVM_PATH=%%CONDA_PREFIX%%\Library\bin\LLVM-C.dll"
              echo if exist "%%CONDA_PREFIX%%\Library\bin\LLVM.dll" set "DRJIT_LIBLLVM_PATH=%%CONDA_PREFIX%%\Library\bin\LLVM.dll"
            ) > "%PREFIX%\etc\conda\activate.d\mitsuba-drjit-llvm.bat"
            (
              echo if defined CONDA_BACKUP_DRJIT_LIBLLVM_PATH ^(
              echo   set "DRJIT_LIBLLVM_PATH=%%CONDA_BACKUP_DRJIT_LIBLLVM_PATH%%"
              echo   set "CONDA_BACKUP_DRJIT_LIBLLVM_PATH="
              echo ^) else ^(
              echo   set "DRJIT_LIBLLVM_PATH="
              echo ^)
            ) > "%PREFIX%\etc\conda\deactivate.d\mitsuba-drjit-llvm.bat"
            (
              echo if ^(Test-Path Env:DRJIT_LIBLLVM_PATH^) { $env:CONDA_BACKUP_DRJIT_LIBLLVM_PATH = $env:DRJIT_LIBLLVM_PATH } else { Remove-Item Env:CONDA_BACKUP_DRJIT_LIBLLVM_PATH -ErrorAction SilentlyContinue }
              echo if ^(Test-Path "$env:CONDA_PREFIX\Library\bin\LLVM-C.dll"^) { $env:DRJIT_LIBLLVM_PATH = "$env:CONDA_PREFIX\Library\bin\LLVM-C.dll" }
              echo if ^(Test-Path "$env:CONDA_PREFIX\Library\bin\LLVM.dll"^) { $env:DRJIT_LIBLLVM_PATH = "$env:CONDA_PREFIX\Library\bin\LLVM.dll" }
            ) > "%PREFIX%\etc\conda\activate.d\mitsuba-drjit-llvm.ps1"
            (
              echo if ^(Test-Path Env:CONDA_BACKUP_DRJIT_LIBLLVM_PATH^) { $env:DRJIT_LIBLLVM_PATH = $env:CONDA_BACKUP_DRJIT_LIBLLVM_PATH; Remove-Item Env:CONDA_BACKUP_DRJIT_LIBLLVM_PATH -ErrorAction SilentlyContinue } else { Remove-Item Env:DRJIT_LIBLLVM_PATH -ErrorAction SilentlyContinue }
            ) > "%PREFIX%\etc\conda\deactivate.d\mitsuba-drjit-llvm.ps1"
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - git
        - ninja
      host:
        - python
        - pip
        - scikit-build-core
        - hatch-fancy-pypi-readme
        - libllvm${{ llvm_major }}
        - typing_extensions >=4.12
        - zlib

  - package:
      name: mitsuba-python
    inherit: mitsuba-python-build
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - lib/python*/site-packages/mitsuba/**
        - lib/python*/site-packages/drjit/**
        - lib/python*/site-packages/Mitsuba-*.dist-info/**
        - lib/python*/site-packages/mitsuba-*.dist-info/**
        - Lib/site-packages/mitsuba/**
        - Lib/site-packages/drjit/**
        - Lib/site-packages/Mitsuba-*.dist-info/**
        - Lib/site-packages/mitsuba-*.dist-info/**
        - etc/conda/activate.d/mitsuba-drjit-llvm.*
        - etc/conda/deactivate.d/mitsuba-drjit-llvm.*
    requirements:
      run:
        - python
        - libllvm${{ llvm_major }}
        - typing_extensions >=4.12
        - zlib
      run_constraints:
        - drjit <0a0
    tests:
      - package_contents:
          files:
            not_exists:
              - bin/mitsuba
              - Scripts/mitsuba.exe
      - python:
          imports:
            - drjit
            - mitsuba
      - script:
          - if: unix
            then:
              - test -f "$SP_DIR/mitsuba/__init__.py"
              - test -f "$SP_DIR/mitsuba/config.py"
              - test -f "$SP_DIR/drjit/__init__.py"
          - if: win
            then:
              - if not exist "%SP_DIR%\mitsuba\__init__.py" exit /b 1
              - if not exist "%SP_DIR%\mitsuba\config.py" exit /b 1
              - if not exist "%SP_DIR%\drjit\__init__.py" exit /b 1
          - python tests/check_python.py
        files:
          recipe:
            - tests/check_python.py
        requirements:
          run:
            - python

  - package:
      name: mitsuba-tools
    inherit: mitsuba-python-build
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - bin/mitsuba
        - Scripts/mitsuba.exe
        - Scripts/mitsuba-script.py
    requirements:
      run:
        - ${{ pin_subpackage('mitsuba-python', exact=True) }}
    tests:
      - package_contents:
          files:
            not_exists:
              - lib/python*/site-packages/mitsuba/__init__.py
              - Lib/site-packages/mitsuba/__init__.py
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/bin/mitsuba"
          - if: win
            then:
              - if not exist "%PREFIX%\Scripts\mitsuba.exe" exit /b 1
          - python tests/check_tools.py
        files:
          recipe:
            - tests/check_tools.py
        requirements:
          run:
            - python

  - package:
      name: mitsuba
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
    requirements:
      run:
        - ${{ pin_subpackage('mitsuba-python', exact=True) }}
        - ${{ pin_subpackage('mitsuba-tools', exact=True) }}
    tests:
      - package_contents:
          files:
            not_exists:
              - bin/mitsuba
              - Scripts/mitsuba.exe
              - lib/python*/site-packages/mitsuba/__init__.py
              - Lib/site-packages/mitsuba/__init__.py
      - script:
          - python tests/check_python.py
          - python tests/check_tools.py
        files:
          recipe:
            - tests/check_python.py
            - tests/check_tools.py
        requirements:
          run:
            - python

about:
  homepage: https://github.com/mitsuba-renderer/mitsuba3
  license: BSD-3-Clause
  license_file: LICENSE
  summary: Mitsuba 3 is a retargetable forward and inverse renderer.
