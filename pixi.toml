[workspace]
name = "aswf-pixi"
channels = [
  "https://conda.anaconda.org/anderslanglands",
  "conda-forge",
]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]
channel-priority = "strict"

[dependencies]
rattler-build = ">=0.40"
anaconda-client = ">=1.12"
python = ">=3.12"

