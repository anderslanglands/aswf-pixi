context:
  version: "13.0.0"
  build_number: 0

recipe:
  name: openvdb
  version: ${{ version }}

source:
  url: https://github.com/AcademySoftwareFoundation/openvdb/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 4d6a91df5f347017496fe8d22c3dbb7c4b5d7289499d4eb4d53dd2c75bb454e1

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: openvdb-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DOPENVDB_BUILD_CORE=ON \
              -DOPENVDB_CORE_SHARED=ON \
              -DOPENVDB_CORE_STATIC=OFF \
              -DOPENVDB_BUILD_BINARIES=ON \
              -DOPENVDB_BUILD_VDB_PRINT=ON \
              -DOPENVDB_BUILD_VDB_LOD=ON \
              -DOPENVDB_BUILD_VDB_RENDER=OFF \
              -DOPENVDB_BUILD_VDB_VIEW=OFF \
              -DOPENVDB_BUILD_VDB_TOOL=OFF \
              -DOPENVDB_BUILD_VDB_AX=OFF \
              -DOPENVDB_BUILD_PYTHON_MODULE=OFF \
              -DOPENVDB_BUILD_UNITTESTS=OFF \
              -DOPENVDB_BUILD_DOCS=OFF \
              -DOPENVDB_BUILD_HOUDINI_PLUGIN=OFF \
              -DOPENVDB_BUILD_MAYA_PLUGIN=OFF \
              -DOPENVDB_BUILD_AX=OFF \
              -DOPENVDB_BUILD_NANOVDB=OFF \
              -DOPENVDB_INSTALL_CMAKE_MODULES=ON \
              -DOPENVDB_ENABLE_UNINSTALL=OFF \
              -DUSE_BLOSC=ON \
              -DUSE_ZLIB=ON \
              -DUSE_TBB=ON \
              -DUSE_LOG4CPLUS=OFF \
              -DUSE_EXR=OFF \
              -DUSE_IMATH_HALF=OFF \
              -DUSE_PNG=OFF \
              -DUSE_AX=OFF \
              -DUSE_NANOVDB=OFF \
              -DUSE_CCACHE=OFF \
              -DCONCURRENT_MALLOC=None \
              -DTBB_ROOT=$PREFIX \
              -DBoost_ROOT=$PREFIX \
              -DBlosc_ROOT=$PREFIX \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install

            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake -DOPENVDB_CONFIG_PREFIX="$PREFIX" \
              -DOPENVDB_CONFIG_VERSION="${{ version }}" \
              -P "$recipe_dir/cmake/install-openvdb-config.cmake"
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DOPENVDB_BUILD_CORE=ON ^
              -DOPENVDB_CORE_SHARED=ON ^
              -DOPENVDB_CORE_STATIC=OFF ^
              -DOPENVDB_BUILD_BINARIES=ON ^
              -DOPENVDB_BUILD_VDB_PRINT=ON ^
              -DOPENVDB_BUILD_VDB_LOD=ON ^
              -DOPENVDB_BUILD_VDB_RENDER=OFF ^
              -DOPENVDB_BUILD_VDB_VIEW=OFF ^
              -DOPENVDB_BUILD_VDB_TOOL=OFF ^
              -DOPENVDB_BUILD_VDB_AX=OFF ^
              -DOPENVDB_BUILD_PYTHON_MODULE=OFF ^
              -DOPENVDB_BUILD_UNITTESTS=OFF ^
              -DOPENVDB_BUILD_DOCS=OFF ^
              -DOPENVDB_BUILD_HOUDINI_PLUGIN=OFF ^
              -DOPENVDB_BUILD_MAYA_PLUGIN=OFF ^
              -DOPENVDB_BUILD_AX=OFF ^
              -DOPENVDB_BUILD_NANOVDB=OFF ^
              -DOPENVDB_INSTALL_CMAKE_MODULES=ON ^
              -DOPENVDB_ENABLE_UNINSTALL=OFF ^
              -DUSE_BLOSC=ON ^
              -DUSE_ZLIB=ON ^
              -DUSE_TBB=ON ^
              -DUSE_LOG4CPLUS=OFF ^
              -DUSE_EXR=OFF ^
              -DUSE_IMATH_HALF=OFF ^
              -DUSE_PNG=OFF ^
              -DUSE_AX=OFF ^
              -DUSE_NANOVDB=OFF ^
              -DUSE_CCACHE=OFF ^
              -DCONCURRENT_MALLOC=None ^
              -DTBB_ROOT=%LIBRARY_PREFIX% ^
              -DBoost_ROOT=%LIBRARY_PREFIX% ^
              -DBlosc_ROOT=%LIBRARY_PREFIX% ^
              -B %SRC_DIR%\..\build ^
              -S .

            cmake --build %SRC_DIR%\..\build --target install --config Release

            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake -DOPENVDB_CONFIG_PREFIX="%LIBRARY_PREFIX%" ^
              -DOPENVDB_CONFIG_VERSION="${{ version }}" ^
              -P "%RECIPE_DIR_VAR%\cmake\install-openvdb-config.cmake"
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - blosc
        - libboost-devel
        - tbb-devel >=2022.3,<2023
        - zlib

