              - cmake --build build --target openvdb_consumer --config Release
              - build\openvdb_consumer.exe recipe-test.vdb
              - nanovdb_convert -f recipe-test.vdb recipe-test.nvdb
              - if not exist recipe-test.nvdb exit /b 1
              - for %%I in (recipe-test.nvdb) do if %%~zI LEQ 0 exit /b 1
              - if exist "%LIBRARY_BIN%\nanovdb_print.exe" exit /b 1
              - if exist "%LIBRARY_BIN%\nanovdb_validate.exe" exit /b 1
        files:
          recipe:
