              -DBoost_ROOT=%LIBRARY_PREFIX% ^
              -DBlosc_ROOT=%LIBRARY_PREFIX% ^
              -B %SRC_DIR%\..\build-nanovdb-openvdb ^
              -S .

            cmake --build %SRC_DIR%\..\build-nanovdb-openvdb --target install --config Release
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - blosc
        - libboost-devel
        - tbb-devel >=2022.3,<2023
        - zlib

  - package:
      name: openvdb-lib
    inherit: openvdb-build
    build:
      files:
        - lib/libopenvdb*.so*
        - lib/libopenvdb*.dylib*
        - Library/bin/openvdb*.dll
    requirements:
      run:
        - blosc
        - libboost
        - libzlib
        - tbb >=2022.3,<2023
      run_constraints:
        - tbb >=2022.3,<2023
      run_exports:
        weak:
          - ${{ pin_subpackage('openvdb-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/openvdb/openvdb.h
              - include/nanovdb/NanoVDB.h
              - lib/cmake/OpenVDB/FindOpenVDB.cmake
              - bin/vdb_print
              - bin/vdb_view
              - Library/include/openvdb/openvdb.h
              - Library/include/nanovdb/NanoVDB.h
              - Library/lib/cmake/OpenVDB/FindOpenVDB.cmake
              - Library/bin/vdb_print.exe
              - Library/bin/vdb_view.exe
      - script:
          - if: linux
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libopenvdb.so*')); assert paths; ctypes.CDLL(paths[0])"
          - if: osx
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libopenvdb*.dylib*')); assert paths; ctypes.CDLL(paths[0])"
          - if: win
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['LIBRARY_BIN'], 'openvdb*.dll')); assert paths; ctypes.WinDLL(paths[0])"
        requirements:
          run:
            - python

  - package:
      name: openvdb-dev
    inherit: openvdb-build
    build:
      files:
        - include/openvdb/**
        - lib/cmake/OpenVDB/**
        - Library/include/openvdb/**
        - Library/lib/openvdb*.lib
        - Library/lib/cmake/OpenVDB/**
    requirements:
      run:
        - ${{ pin_subpackage('openvdb-lib', exact=True) }}
        - tbb >=2022.3,<2023
        - blosc
        - libboost-devel
        - tbb-devel >=2022.3,<2023
        - zlib
      run_constraints:
        - tbb >=2022.3,<2023
      run_exports:
        weak:
          - ${{ pin_subpackage('openvdb-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - openvdb/openvdb.h
            - openvdb/version.h
          files:
            not_exists:
              - include/nanovdb/NanoVDB.h
              - bin/vdb_print
              - Library/include/nanovdb/NanoVDB.h
              - Library/bin/vdb_print.exe
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/OpenVDB/OpenVDBConfig.cmake"
              - test -f "$PREFIX/lib/cmake/OpenVDB/FindOpenVDB.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DBUILD_NANOVDB_CONSUMER=OFF
              - cmake --build build --target openvdb_consumer
              - ./build/openvdb_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\OpenVDB\OpenVDBConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_LIB%\cmake\OpenVDB\FindOpenVDB.cmake" exit /b 1
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%" -DBUILD_NANOVDB_CONSUMER=OFF
              - cmake --build build --target openvdb_consumer --config Release
              - build\openvdb_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openvdb_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: openvdb-tools
    inherit: openvdb-build
    build:
      files:
        - bin/vdb_print
        - bin/vdb_lod
        - Library/bin/vdb_print.exe
        - Library/bin/vdb_lod.exe
    requirements:
      run:
        - ${{ pin_subpackage('openvdb-lib', exact=True) }}
        - tbb >=2022.3,<2023
      run_constraints:
        - tbb >=2022.3,<2023
    tests:
      - script:
          - vdb_print --version
          - vdb_lod --version
          - if: unix
            then:
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DBUILD_NANOVDB_CONSUMER=OFF
              - cmake --build build --target openvdb_consumer
              - ./build/openvdb_consumer recipe-test.vdb
              - vdb_print recipe-test.vdb
              - vdb_lod recipe-test.vdb recipe-test-lod.vdb -range 0-1
              - test -s recipe-test-lod.vdb
              - test ! -e "$PREFIX/bin/vdb_render"
              - test ! -e "$PREFIX/bin/vdb_view"
          - if: win
            then:
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%" -DBUILD_NANOVDB_CONSUMER=OFF
              - cmake --build build --target openvdb_consumer --config Release
              - build\openvdb_consumer.exe recipe-test.vdb
              - vdb_print recipe-test.vdb
              - vdb_lod recipe-test.vdb recipe-test-lod.vdb -range 0-1
              - if not exist recipe-test-lod.vdb exit /b 1
              - for %%I in (recipe-test-lod.vdb) do if %%~zI LEQ 0 exit /b 1
              - if exist "%LIBRARY_BIN%\vdb_render.exe" exit /b 1
              - if exist "%LIBRARY_BIN%\vdb_view.exe" exit /b 1
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openvdb_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - ${{ pin_subpackage('openvdb-dev', exact=True) }}

  - package:
      name: openvdb-guitools
    inherit: openvdb-guitools-build
    build:
      files:
        - bin/vdb_render
        - bin/vdb_view
        - Library/bin/vdb_render.exe
        - Library/bin/vdb_view.exe
    requirements:
      run:
        - ${{ pin_subpackage('openvdb-lib', exact=True) }}
        - glfw
        - libpng
        - openexr-lib 3.4.*
        - tbb >=2022.3,<2023
        - if: linux
          then: libgl
        - if: linux
          then: libglu
        - if: win
          then: glew
      run_constraints:
        - tbb >=2022.3,<2023
    tests:
      - script:
          - vdb_render --version
          - if: unix
            then:
              - test -x "$PREFIX/bin/vdb_view"
              - vdb_render -help 2>&1 | grep "ppm,exr,png"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DBUILD_NANOVDB_CONSUMER=OFF
              - cmake --build build --target openvdb_consumer
              - ./build/openvdb_consumer recipe-test.vdb
              - vdb_render recipe-test.vdb render-test.png -res 8x8 -cpus 1 -samples 1
              - test -s render-test.png
              - vdb_render recipe-test.vdb render-test.exr -res 8x8 -cpus 1 -samples 1
              - test -s render-test.exr
              - test ! -e "$PREFIX/bin/vdb_print"
              - test ! -e "$PREFIX/bin/vdb_lod"
          - if: win
            then:
              - if not exist "%LIBRARY_BIN%\vdb_view.exe" exit /b 1
              - vdb_render -help 2>&1 | findstr /C:"ppm,exr,png"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%" -DBUILD_NANOVDB_CONSUMER=OFF
              - cmake --build build --target openvdb_consumer --config Release
              - build\openvdb_consumer.exe recipe-test.vdb
              - vdb_render recipe-test.vdb render-test.png -res 8x8 -cpus 1 -samples 1
              - if not exist render-test.png exit /b 1
              - for %%I in (render-test.png) do if %%~zI LEQ 0 exit /b 1
              - vdb_render recipe-test.vdb render-test.exr -res 8x8 -cpus 1 -samples 1
              - if not exist render-test.exr exit /b 1
              - for %%I in (render-test.exr) do if %%~zI LEQ 0 exit /b 1
              - if exist "%LIBRARY_BIN%\vdb_print.exe" exit /b 1
              - if exist "%LIBRARY_BIN%\vdb_lod.exe" exit /b 1
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openvdb_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - ${{ pin_subpackage('openvdb-dev', exact=True) }}

  - package:
      name: openvdb-python
    inherit: openvdb-python-build
    build:
      string: py${{ python | version_to_buildstring }}h${{ hash }}_${{ build_number }}
      files:
        - lib/python*/site-packages/openvdb*.so
        - Lib/site-packages/openvdb*.pyd
    requirements:
      run:
        - ${{ pin_subpackage('openvdb-lib', exact=True) }}
        - numpy
        - python
        - tbb >=2022.3,<2023
      run_constraints:
        - tbb >=2022.3,<2023
    tests:
      - python:
          imports:
            - openvdb
      - script:
          - python -c "import openvdb; grid = openvdb.FloatGrid(); assert grid is not None; assert openvdb.FloatGrid"
          - if: unix
            then:
              - test ! -e "$PREFIX/bin/vdb_print"
          - if: win
            then:
              - if exist "%LIBRARY_BIN%\vdb_print.exe" exit /b 1
        requirements:
          run:
            - python

  - package:
      name: nanovdb-dev
    inherit: nanovdb-build
    build:
      files:
        - include/nanovdb/**
        - Library/include/nanovdb/**
    requirements:
      run:
        - tbb >=2022.3,<2023
        - tbb-devel >=2022.3,<2023
      run_constraints:
        - tbb >=2022.3,<2023
    tests:
      - package_contents:
