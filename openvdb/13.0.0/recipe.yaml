          files:
            not_exists:
              - include/openvdb/openvdb.h
              - bin/nanovdb_print
              - bin/nanovdb_convert
              - Library/include/openvdb/openvdb.h
              - Library/bin/nanovdb_print.exe
              - Library/bin/nanovdb_convert.exe
      - script:
          - if: unix
            then:
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DBUILD_OPENVDB_CONSUMER=OFF
              - cmake --build build --target nanovdb_consumer
              - ./build/nanovdb_consumer
          - if: win
            then:
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%" -DBUILD_OPENVDB_CONSUMER=OFF
              - cmake --build build --target nanovdb_consumer --config Release
              - build\nanovdb_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/nanovdb_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
