name: Check upstream releases

on:
  schedule:
    - cron: "23 11 * * *"
  workflow_dispatch:
    inputs:
      packages:
        description: "Optional comma-separated package directories to check"
        required: false
        default: ""
      dispatch_build:
        description: "Dispatch the package build workflow when new recipes are created"
        required: true
        type: boolean
        default: true
      platforms:
        description: "Platforms to pass to build-packages.yml"
        required: true
        default: "default"
      publish_target:
        description: "Publish target to pass to build-packages.yml"
        required: true
        type: choice
        options:
          - artifact-only
          - test-label
        default: test-label
      run_smoke_tests:
        description: "Run smoke tests after publishing from build-packages.yml"
        required: true
        type: boolean
        default: true

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: upstream-release-check
  cancel-in-progress: false

jobs:
  check:
    name: Check upstream releases
    runs-on: ubuntu-latest
    env:
      AUTOMATION_BRANCH_PREFIX: automation/upstream-release-prs
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check upstream releases
        id: detect
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGES: ${{ inputs.packages }}
          REPORT: ${{ runner.temp }}/upstream-release-report.md
          RESULT_JSON: ${{ runner.temp }}/upstream-releases.json
        run: |
          args=(
            scripts/check_upstream_releases.py
            --apply
            --output-json "$RESULT_JSON"
            --report "$REPORT"
            --github-output "$GITHUB_OUTPUT"
          )
          if [[ -n "$PACKAGES" ]]; then
            args+=(--package "$PACKAGES")
          fi
          python "${args[@]}"

      - name: Create per-recipe pull requests and dispatch builds
        if: ${{ steps.detect.outputs.created == 'true' }}
        shell: bash
        env:
          RESULT_JSON: ${{ runner.temp }}/upstream-releases.json
          PR_GH_TOKEN: ${{ secrets.UPSTREAM_RELEASE_PR_TOKEN || github.token }}
          ACTIONS_GH_TOKEN: ${{ github.token }}
          PLATFORMS: ${{ inputs.platforms }}
          PUBLISH_TARGET: ${{ inputs.publish_target }}
          RUN_SMOKE_TESTS: ${{ inputs.run_smoke_tests }}
          DISPATCH_BUILD: ${{ github.event_name == 'schedule' || inputs.dispatch_build }}
        run: scripts/create_upstream_release_prs.sh

      - name: Summarize result
        shell: bash
        env:
          REPORT: ${{ runner.temp }}/upstream-release-report.md
        run: |
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
