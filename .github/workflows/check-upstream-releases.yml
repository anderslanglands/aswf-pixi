name: Check upstream releases

on:
  schedule:
    - cron: "23 11 * * *"
  workflow_dispatch:
    inputs:
      packages:
        description: "Optional comma-separated package directories to check"
        required: false
        default: ""
      dispatch_build:
        description: "Dispatch the package build workflow when new recipes are created"
        required: true
        type: boolean
        default: true
      platforms:
        description: "Platforms to pass to build-packages.yml"
        required: true
        default: "default"
      publish_target:
        description: "Publish target to pass to build-packages.yml"
        required: true
        type: choice
        options:
          - artifact-only
          - test-label
        default: test-label
      run_smoke_tests:
        description: "Run smoke tests after publishing from build-packages.yml"
        required: true
        type: boolean
        default: true

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: upstream-release-check
  cancel-in-progress: false

jobs:
  check:
    name: Check upstream releases
    runs-on: ubuntu-latest
    env:
      AUTOMATION_BRANCH: automation/upstream-releases
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare automation branch
        id: branch
        shell: bash
        run: |
          git fetch origin "$AUTOMATION_BRANCH" || true
          git checkout -B "$AUTOMATION_BRANCH"
          echo "branch=$AUTOMATION_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Check upstream releases
        id: detect
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PACKAGES: ${{ inputs.packages }}
          REPORT: ${{ runner.temp }}/upstream-release-report.md
          RESULT_JSON: ${{ runner.temp }}/upstream-releases.json
        run: |
          args=(
            scripts/check_upstream_releases.py
            --apply
            --output-json "$RESULT_JSON"
            --report "$REPORT"
            --github-output "$GITHUB_OUTPUT"
          )
          if [[ -n "$PACKAGES" ]]; then
            args+=(--package "$PACKAGES")
          fi
          python "${args[@]}"

      - name: Commit and push generated recipes
        if: ${{ steps.detect.outputs.created == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Detector reported new recipes, but no file changes were staged." >&2
            exit 1
          fi
          git commit -m "Add upstream release recipe updates"
          git push --force-with-lease origin "$AUTOMATION_BRANCH"

      - name: Open or update pull request
        if: ${{ steps.detect.outputs.created == 'true' }}
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPORT: ${{ runner.temp }}/upstream-release-report.md
        run: |
          body_file="$RUNNER_TEMP/upstream-release-pr-body.md"
          {
            echo "Automated upstream release check created new recipe copies."
            echo
            cat "$REPORT"
            echo "The build workflow is dispatched separately on this branch when enabled."
          } > "$body_file"

          existing="$(gh pr list --head "$AUTOMATION_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing" ]]; then
            gh pr edit "$existing" --title "Add upstream release recipe updates" --body-file "$body_file"
            pr_number="$existing"
          else
            gh pr create \
              --head "$AUTOMATION_BRANCH" \
              --base "$GITHUB_REF_NAME" \
              --title "Add upstream release recipe updates" \
              --body-file "$body_file"
            pr_number="$(gh pr view "$AUTOMATION_BRANCH" --json number --jq '.number')"
          fi
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Dispatch package build workflow
        if: ${{ steps.detect.outputs.created == 'true' && (github.event_name == 'schedule' || inputs.dispatch_build) }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RECIPES: ${{ steps.detect.outputs.recipes }}
          PLATFORMS: ${{ inputs.platforms }}
          PUBLISH_TARGET: ${{ inputs.publish_target }}
          RUN_SMOKE_TESTS: ${{ inputs.run_smoke_tests }}
        run: |
          platforms="${PLATFORMS:-default}"
          publish_target="${PUBLISH_TARGET:-test-label}"
          run_smoke_tests="${RUN_SMOKE_TESTS:-true}"

          gh workflow run build-packages.yml \
            --ref "$AUTOMATION_BRANCH" \
            -f recipes="$RECIPES" \
            -f platforms="$platforms" \
            -f publish_target="$publish_target" \
            -f build_number="" \
            -f run_smoke_tests="$run_smoke_tests"

      - name: Summarize result
        shell: bash
        env:
          REPORT: ${{ runner.temp }}/upstream-release-report.md
        run: |
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
