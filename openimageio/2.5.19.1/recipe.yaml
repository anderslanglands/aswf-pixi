              -DENABLE_zfile=ON ^
              -B %SRC_DIR%\..\build ^
              -S .

            cmake --build %SRC_DIR%\..\build --target install --config Release

            if not exist "%PREFIX%\etc\conda\activate.d" mkdir "%PREFIX%\etc\conda\activate.d"
            if not exist "%PREFIX%\etc\conda\deactivate.d" mkdir "%PREFIX%\etc\conda\deactivate.d"
            (
              echo @echo off
              echo if defined OPENIMAGEIO_PLUGIN_PATH ^(
              echo   set "CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH=%%OPENIMAGEIO_PLUGIN_PATH%%"
              echo   set "OPENIMAGEIO_PLUGIN_PATH=%%CONDA_PREFIX%%\Library\bin;%%OPENIMAGEIO_PLUGIN_PATH%%"
              echo ^) else ^(
              echo   set "CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH="
              echo   set "OPENIMAGEIO_PLUGIN_PATH=%%CONDA_PREFIX%%\Library\bin"
              echo ^)
            ) > "%PREFIX%\etc\conda\activate.d\openimageio-plugin-path.bat"
            (
              echo @echo off
              echo if defined CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH ^(
              echo   set "OPENIMAGEIO_PLUGIN_PATH=%%CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH%%"
              echo   set "CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH="
              echo ^) else ^(
              echo   set "OPENIMAGEIO_PLUGIN_PATH="
              echo ^)
            ) > "%PREFIX%\etc\conda\deactivate.d\openimageio-plugin-path.bat"
            (
              echo if ^(Test-Path Env:OPENIMAGEIO_PLUGIN_PATH^) {
              echo   $env:CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH = $env:OPENIMAGEIO_PLUGIN_PATH
              echo   $env:OPENIMAGEIO_PLUGIN_PATH = "$env:CONDA_PREFIX\Library\bin;$env:OPENIMAGEIO_PLUGIN_PATH"
