              -DENABLE_bmp=ON \
              -DENABLE_cineon=ON \
              -DENABLE_dds=ON \
              -DENABLE_dicom=OFF \
              -DENABLE_dpx=ON \
              -DENABLE_ffmpeg=OFF \
              -DENABLE_fits=ON \
              -DENABLE_gif=OFF \
              -DENABLE_heif=OFF \
              -DENABLE_hdr=ON \
              -DENABLE_ico=ON \
              -DENABLE_iff=ON \
              -DENABLE_jpeg=ON \
              -DENABLE_jpeg2000=OFF \
              -DENABLE_null=ON \
              -DENABLE_openexr=ON \
              -DENABLE_openvdb=OFF \
              -DENABLE_png=ON \
              -DENABLE_pnm=ON \
              -DENABLE_psd=ON \
              -DENABLE_ptex=OFF \
              -DENABLE_r3d=OFF \
              -DENABLE_raw=OFF \
              -DENABLE_rla=ON \
              -DENABLE_sgi=ON \
              -DENABLE_softimage=ON \
              -DENABLE_targa=ON \
              -DENABLE_term=ON \
              -DENABLE_tiff=ON \
              -DENABLE_webp=OFF \
              -DENABLE_zfile=ON \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install

            mkdir -p "$PREFIX/etc/conda/activate.d" "$PREFIX/etc/conda/deactivate.d"
            cat > "$PREFIX/etc/conda/activate.d/openimageio-plugin-path.sh" <<'EOF'
            if [ -n "${OPENIMAGEIO_PLUGIN_PATH+x}" ]; then
                export CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH="$OPENIMAGEIO_PLUGIN_PATH"
                export OPENIMAGEIO_PLUGIN_PATH="$CONDA_PREFIX/lib:$OPENIMAGEIO_PLUGIN_PATH"
            else
                unset CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH
                export OPENIMAGEIO_PLUGIN_PATH="$CONDA_PREFIX/lib"
            fi
