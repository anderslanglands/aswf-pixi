            cat > "$PREFIX/etc/conda/deactivate.d/openimageio-plugin-path.sh" <<'EOF'
            if [ -n "${CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH+x}" ]; then
                export OPENIMAGEIO_PLUGIN_PATH="$CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH"
                unset CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH
            else
                unset OPENIMAGEIO_PLUGIN_PATH
            fi
