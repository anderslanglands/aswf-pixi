    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - pkg-config
      host:
        - blosc
        - bzip2
        - dcmtk
        - ffmpeg
        - fmt
        - giflib
        - imath-dev 3.2.*
        - libboost-devel
        - libheif
        - libjpeg-turbo
        - libpng
        - libraw
        - libtiff
        - libxml2-devel
        - libwebp
        - openexr-dev 3.4.*
        - openjpeg
        - openjph
        - openvdb-dev 13.0.*
        - opencolorio-dev 2.5.*
        - tsl_robin_map 1.4.*
        - tbb-devel >=2022.3,<2023
        - zlib

  - package:
      name: openimageio-lib
    inherit: openimageio-build
    build:
      files:
        - lib/libOpenImageIO*.so*
        - lib/libOpenImageIO*.dylib*
        - Library/bin/OpenImageIO*.dll
        - etc/conda/activate.d/openimageio-plugin-path.*
        - etc/conda/deactivate.d/openimageio-plugin-path.*
    requirements:
      run:
        - imath-lib 3.2.*
        - libjpeg-turbo
        - libpng
        - libtiff
        - libzlib
        - openexr-lib 3.4.*
        - opencolorio-lib 2.5.*
      run_exports:
        weak:
          - ${{ pin_subpackage('openimageio-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/OpenImageIO/imageio.h
              - lib/cmake/OpenImageIO/OpenImageIOConfig.cmake
              - lib/pkgconfig/OpenImageIO.pc
              - Library/include/OpenImageIO/imageio.h
              - Library/lib/cmake/OpenImageIO/OpenImageIOConfig.cmake
              - Library/lib/pkgconfig/OpenImageIO.pc
      - script:
          - if: linux
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libOpenImageIO.so*')); assert paths; ctypes.CDLL(paths[0])"
          - if: osx
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libOpenImageIO*.dylib*')); assert paths; ctypes.CDLL(paths[0])"
          - if: win
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['LIBRARY_BIN'], 'OpenImageIO.dll')); assert paths; ctypes.WinDLL(paths[0])"
          - python -c "import os; from pathlib import Path; expected = os.path.normcase(os.path.normpath(str(os.environ.get('LIBRARY_BIN', Path(os.environ['PREFIX']) / 'lib')))); configured = [os.path.normcase(os.path.normpath(p)) for p in os.environ.get('OPENIMAGEIO_PLUGIN_PATH', '').split(os.pathsep) if p]; assert expected in configured, (expected, configured)"
        requirements:
          run:
            - python
      - script:
          - python tests/check_core_roundtrip.py
        files:
          recipe:
            - tests/check_core_roundtrip.py
        requirements:
          run:
            - python
            - ${{ pin_subpackage('openimageio-tools', exact=True) }}

  - package:
      name: openimageio-dev
    inherit: openimageio-build
    build:
      files:
        - include/OpenImageIO/**
        - lib/cmake/OpenImageIO/**
        - lib/pkgconfig/OpenImageIO.pc
        - Library/include/OpenImageIO/**
        - Library/lib/OpenImageIO*.lib
        - Library/lib/cmake/OpenImageIO/**
        - Library/lib/pkgconfig/OpenImageIO.pc
    requirements:
      run:
        - ${{ pin_subpackage('openimageio-lib', exact=True) }}
        - imath-dev 3.2.*
      run_exports:
        weak:
          - ${{ pin_subpackage('openimageio-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - OpenImageIO/imageio.h
            - OpenImageIO/oiioversion.h
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/OpenImageIO/OpenImageIOConfig.cmake"
              - test -f "$PREFIX/lib/pkgconfig/OpenImageIO.pc"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
              - cmake --build build
              - ./build/openimageio_consumer
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\OpenImageIO\OpenImageIOConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_LIB%\pkgconfig\OpenImageIO.pc" exit /b 1
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%"
              - cmake --build build --config Release
              - build\openimageio_consumer.exe
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openimageio_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

