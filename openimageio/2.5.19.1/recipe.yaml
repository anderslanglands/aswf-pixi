              echo   Remove-Item Env:CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH -ErrorAction SilentlyContinue
              echo   $env:OPENIMAGEIO_PLUGIN_PATH = "$env:CONDA_PREFIX\Library\bin"
              echo }
            ) > "%PREFIX%\etc\conda\activate.d\openimageio-plugin-path.ps1"
            (
              echo if ^(Test-Path Env:CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH^) {
              echo   $env:OPENIMAGEIO_PLUGIN_PATH = $env:CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH
              echo   Remove-Item Env:CONDA_BACKUP_OPENIMAGEIO_PLUGIN_PATH -ErrorAction SilentlyContinue
              echo } else {
              echo   Remove-Item Env:OPENIMAGEIO_PLUGIN_PATH -ErrorAction SilentlyContinue
              echo }
            ) > "%PREFIX%\etc\conda\deactivate.d\openimageio-plugin-path.ps1"
