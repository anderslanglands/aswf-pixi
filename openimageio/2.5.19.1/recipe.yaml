        - Library/bin/idiff.exe
        - Library/bin/igrep.exe
        - Library/bin/iinfo.exe
        - Library/bin/maketx.exe
        - Library/bin/oiiotool.exe
    requirements:
      run:
        - ${{ pin_subpackage('openimageio-lib', exact=True) }}
    tests:
      - script:
