context:
  version: "2.5.19.1"
  build_number: 0

recipe:
  name: openimageio
  version: ${{ version }}

source:
  url: https://github.com/AcademySoftwareFoundation/OpenImageIO/releases/download/v${{ version }}/OpenImageIO-${{ version }}.tar.gz
  sha256: 8e3d7473d7a42e527426c38c35187519488ea2a34e994782bd3e6504a209719f
  patches:
    - patches/cmake-4-private-plugin-linking.patch
    - patches/heif-plugin-init-symbol.patch

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: openimageio-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_STANDARD=17 \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DBUILD_TESTING=OFF \
              -DOIIO_BUILD_TESTS=OFF \
              -DOIIO_BUILD_TOOLS=OFF \
              -DBUILD_DOCS=OFF \
              -DINSTALL_DOCS=OFF \
              -DINSTALL_FONTS=OFF \
              -DEMBEDPLUGINS=ON \
              -DPLUGIN_SEARCH_PATH=$PREFIX/lib \
              -DUSE_PYTHON=OFF \
              -DUSE_QT=OFF \
              -DUSE_Freetype=OFF \
              -DUSE_OpenCV=OFF \
              -DUSE_DCMTK=OFF \
              -DUSE_FFmpeg=OFF \
