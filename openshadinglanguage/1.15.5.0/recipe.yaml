        - ${{ pin_subpackage('openshadinglanguage-cuda-tools', exact=True) }}
      run_exports:
        weak:
          - ${{ pin_subpackage('openshadinglanguage-cuda-lib', upper_bound='x.x') }}
      run_constraints:
        - openshadinglanguage <0a0
    tests:
      - script:
          - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX"
          - cmake --build build
          - ./build/openshadinglanguage_consumer
          - python -c "from pathlib import Path; Path('recipe_test.osl').write_text('shader recipe_test(output color result = color(1, 0, 0)) {}\n', encoding='utf-8')"
          - oslc recipe_test.osl
          - oslinfo recipe_test.oso
          - test -s recipe_test.oso
          - test -f "$PREFIX/share/OSL/shaders/stdosl.h"
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/openshadinglanguage_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - python

