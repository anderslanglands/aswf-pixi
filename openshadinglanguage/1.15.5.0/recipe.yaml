context:
  version: "1.15.5.0"
  build_number: 0
  llvm_major: "22"

recipe:
  name: openshadinglanguage
  version: ${{ version }}

source:
  url: https://github.com/AcademySoftwareFoundation/OpenShadingLanguage/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a83fb396ca5b6724dbaae534840cf07ee6c593f0dbd877a8fa5ed2c32099c934
  patches:
    - fix-llvm-22-clang-components.patch

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: openshadinglanguage-build
    build:
      script:
        - if: unix and osl_gpu == "cpu"
          then: |
            cmake -E rm -rf $SRC_DIR/../build
            recipe_dir="${RECIPE_DIR:-${RATTLER_BUILD_RECIPE_DIR:-}}"
            if [ -z "$recipe_dir" ]; then
              echo "RECIPE_DIR is not set" >&2
              exit 1
            fi
            cmake -DOSL_PARTIO_PREFIX="$PREFIX" -P "$recipe_dir/cmake/patch-partio-target.cmake"

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DBUILD_TESTING=OFF \
              -DOSL_BUILD_TESTS=OFF \
              -DOSL_BUILD_PLUGINS=OFF \
              -DOSL_BUILD_SHADERS=ON \
              -DOSL_USE_OPTIX=OFF \
              -DUSE_PYTHON=OFF \
              -DUSE_QT=OFF \
              -DINSTALL_DOCS=OFF \
              -DUSE_BATCHED=0 \
              -DUSE_CCACHE=OFF \
              -DBUILD_MISSING_DEPS=OFF \
              -DBUILD_MISSING_ROBINMAP=OFF \
              -DROBINMAP_INCLUDE_DIR=$PREFIX/include \
              -DOpenImageIO_ROOT=$PREFIX \
              -DImath_ROOT=$PREFIX \
              -Dpartio_ROOT=$PREFIX \
              -Dllvm_ROOT=$PREFIX \
              -DLLVM_ROOT=$PREFIX \
              -DLLVM_DIRECTORY=$PREFIX \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install
        - if: win and osl_gpu == "cpu"
          then: |
            cmake -E rm -rf %SRC_DIR%\..\build
            set "LIBRARY_PREFIX_FWD=%LIBRARY_PREFIX:\=/%"
            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake -DOSL_PARTIO_PREFIX="%LIBRARY_PREFIX_FWD%" -P "%RECIPE_DIR_VAR%\cmake\patch-partio-target.cmake"
            set "CL=/utf-8 %CL%"
            set "CXXFLAGS=%CXXFLAGS% /utf-8"
            set "RECIPE_DIR_VAR=%RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" set "RECIPE_DIR_VAR=%RATTLER_BUILD_RECIPE_DIR%"
            if "%RECIPE_DIR_VAR%"=="" (
              echo RECIPE_DIR is not set
              exit /b 1
            )
            cmake -DPARTIO_CONFIG_PREFIX="%LIBRARY_PREFIX%" -P "%RECIPE_DIR_VAR%\cmake\patch-partio-config-alias.cmake"
            cmake -DZSTD_LIB_DIR="%LIBRARY_LIB%" -P "%RECIPE_DIR_VAR%\cmake\patch-zstd-import-lib-alias.cmake"

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX_FWD% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DBUILD_TESTING=OFF ^
              -DOSL_BUILD_TESTS=OFF ^
              -DOSL_BUILD_PLUGINS=OFF ^
              -DOSL_BUILD_SHADERS=ON ^
              -DOSL_USE_OPTIX=OFF ^
              -DUSE_LLVM_BITCODE=OFF ^
              -DUSE_PYTHON=OFF ^
              -DUSE_QT=OFF ^
              -DINSTALL_DOCS=OFF ^
              -DUSE_BATCHED=0 ^
              -DUSE_CCACHE=OFF ^
              -DBUILD_MISSING_DEPS=OFF ^
              -DBUILD_MISSING_ROBINMAP=OFF ^
              -DROBINMAP_INCLUDE_DIR=%LIBRARY_PREFIX_FWD%/include ^
              -DOpenImageIO_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DImath_ROOT=%LIBRARY_PREFIX_FWD% ^
              -Dpartio_ROOT=%LIBRARY_PREFIX_FWD% ^
              -Dllvm_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DLLVM_ROOT=%LIBRARY_PREFIX_FWD% ^
              -DLLVM_DIRECTORY=%LIBRARY_PREFIX_FWD% ^
              -B %SRC_DIR%\..\build ^
              -S .

            cmake --build %SRC_DIR%\..\build --target install --config Release
    requirements:
      build:
        - if: osl_gpu == "cpu"
          then:
            - ${{ compiler('c') }}
            - ${{ compiler('cxx') }}
            - cmake
            - ninja
            - python 3.14.*
            - pkg-config
            - if: unix
              then: bison
            - if: unix
              then: flex
            - if: win
              then: winflexbison
      host:
        - if: osl_gpu == "cpu"
          then:
            - clangdev ${{ llvm_major }}.*
            - imath-dev 3.2.*
            - libxml2-devel
            - llvmdev ${{ llvm_major }}.*
            - openimageio-dev 3.1.*
            - partio-dev 1.20.*
            - pugixml
            - tsl_robin_map 1.4.*
            - zlib
            - zstd

