context:
  version: "3.7.0"
  tag: v3_7_0
  build_number: 0

recipe:
  name: opensubdiv
  version: ${{ version }}

source:
  url: https://github.com/PixarAnimationStudios/OpenSubdiv/archive/refs/tags/${{ tag }}.tar.gz
  sha256: f843eb49daf20264007d807cbc64516a1fed9cdb1149aaf84ff47691d97491f9

build:
  number: ${{ build_number }}

outputs:
  - staging:
      name: opensubdiv-build
    build:
      script:
        - if: unix
          then: |
            cmake -E rm -rf $SRC_DIR/../build

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DNO_EXAMPLES=ON \
              -DNO_TUTORIALS=ON \
              -DNO_REGRESSION=ON \
              -DNO_TESTS=ON \
              -DNO_GLTESTS=ON \
              -DNO_PTEX=ON \
              -DNO_DOC=ON \
              -DNO_OMP=ON \
              -DNO_TBB=ON \
              -DNO_CUDA=ON \
              -DNO_OPENCL=ON \
              -DNO_CLEW=ON \
              -DNO_OPENGL=ON \
              -DNO_METAL=ON \
              -DNO_DX=ON \
              -DNO_GLEW=ON \
              -DNO_GLFW=ON \
              -DNO_GLFW_X11=ON \
              -DNO_MACOS_FRAMEWORK=ON \
              -B $SRC_DIR/../build \
              -S .

            cmake --build $SRC_DIR/../build --target install
          else: |
            cmake -E rm -rf %SRC_DIR%\..\build

            cmake %CMAKE_ARGS% ^
              -GNinja ^
              -DCMAKE_BUILD_TYPE=Release ^
              -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% ^
              -DCMAKE_INSTALL_LIBDIR=lib ^
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ^
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON ^
              -DBUILD_SHARED_LIBS=ON ^
              -DNO_EXAMPLES=ON ^
              -DNO_TUTORIALS=ON ^
              -DNO_REGRESSION=ON ^
              -DNO_TESTS=ON ^
              -DNO_GLTESTS=ON ^
              -DNO_PTEX=ON ^
              -DNO_DOC=ON ^
              -DNO_OMP=ON ^
              -DNO_TBB=ON ^
              -DNO_CUDA=ON ^
              -DNO_OPENCL=ON ^
              -DNO_CLEW=ON ^
              -DNO_OPENGL=ON ^
              -DNO_METAL=ON ^
              -DNO_DX=ON ^
              -DNO_GLEW=ON ^
              -DNO_GLFW=ON ^
              -DNO_GLFW_X11=ON ^
              -DNO_MACOS_FRAMEWORK=ON ^
              -B %SRC_DIR%\..\build ^
              -S .

            cmake --build %SRC_DIR%\..\build --target install --config Release
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - cmake
        - ninja

  - staging:
      name: opensubdiv-gpu-build
    build:
      script:
        - if: win
          then:
            - echo OpenSubdiv GPU outputs are not built on Windows
        - if: linux
          then: |
            cmake -E rm -rf $SRC_DIR/../build-gpu

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DNO_EXAMPLES=ON \
              -DNO_TUTORIALS=ON \
              -DNO_REGRESSION=ON \
              -DNO_TESTS=ON \
              -DNO_GLTESTS=ON \
              -DNO_PTEX=ON \
              -DNO_DOC=ON \
              -DNO_OMP=ON \
              -DNO_TBB=OFF \
              -DNO_CUDA=ON \
              -DNO_OPENCL=ON \
              -DNO_CLEW=ON \
              -DNO_OPENGL=OFF \
              -DNO_METAL=ON \
              -DNO_DX=ON \
              -DNO_GLEW=OFF \
              -DNO_GLFW=OFF \
              -DNO_GLFW_X11=OFF \
              -DNO_MACOS_FRAMEWORK=ON \
              -DTBB_ROOT=$PREFIX \
              -DGLEW_LOCATION=$PREFIX \
              -DGLFW_LOCATION=$PREFIX \
              -B $SRC_DIR/../build-gpu \
              -S .

            cmake --build $SRC_DIR/../build-gpu --target install

            cat > opensubdiv-config-deps.cmake <<'EOF'
            set(_opensubdiv_config "$ENV{PREFIX}/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake")
            file(READ "${_opensubdiv_config}" _opensubdiv_config_contents)
            set(_opensubdiv_targets [[include("${CMAKE_CURRENT_LIST_DIR}/OpenSubdivTargets.cmake")]])
            set(_opensubdiv_deps "include(CMakeFindDependencyMacro)\nfind_dependency(TBB CONFIG REQUIRED)\nfind_dependency(OpenGL REQUIRED)\n${_opensubdiv_targets}")
            string(REPLACE "${_opensubdiv_targets}" "${_opensubdiv_deps}" _opensubdiv_config_contents "${_opensubdiv_config_contents}")
            file(WRITE "${_opensubdiv_config}" "${_opensubdiv_config_contents}")
            EOF
            cmake -P opensubdiv-config-deps.cmake
        - if: osx
          then: |
            cmake -E rm -rf $SRC_DIR/../build-gpu

            cmake $CMAKE_ARGS \
              -GNinja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_INSTALL_LIBDIR=lib \
              -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
              -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON \
              -DBUILD_SHARED_LIBS=ON \
              -DNO_EXAMPLES=ON \
              -DNO_TUTORIALS=ON \
              -DNO_REGRESSION=ON \
              -DNO_TESTS=ON \
              -DNO_GLTESTS=ON \
              -DNO_PTEX=ON \
              -DNO_DOC=ON \
              -DNO_OMP=ON \
              -DNO_TBB=OFF \
              -DNO_CUDA=ON \
              -DNO_OPENCL=ON \
              -DNO_CLEW=ON \
              -DNO_OPENGL=OFF \
              -DNO_METAL=OFF \
              -DNO_DX=ON \
              -DNO_GLEW=OFF \
              -DNO_GLFW=OFF \
              -DNO_GLFW_X11=OFF \
              -DNO_MACOS_FRAMEWORK=ON \
              -DTBB_ROOT=$PREFIX \
              -DGLEW_LOCATION=$PREFIX \
              -DGLFW_LOCATION=$PREFIX \
              -B $SRC_DIR/../build-gpu \
              -S .

            cmake --build $SRC_DIR/../build-gpu --target install

            cat > opensubdiv-config-deps.cmake <<'EOF'
            set(_opensubdiv_config "$ENV{PREFIX}/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake")
            file(READ "${_opensubdiv_config}" _opensubdiv_config_contents)
            set(_opensubdiv_targets [[include("${CMAKE_CURRENT_LIST_DIR}/OpenSubdivTargets.cmake")]])
            set(_opensubdiv_deps "include(CMakeFindDependencyMacro)\nfind_dependency(TBB CONFIG REQUIRED)\nfind_dependency(OpenGL REQUIRED)\n${_opensubdiv_targets}")
            string(REPLACE "${_opensubdiv_targets}" "${_opensubdiv_deps}" _opensubdiv_config_contents "${_opensubdiv_config_contents}")
            file(WRITE "${_opensubdiv_config}" "${_opensubdiv_config_contents}")
            EOF
            cmake -P opensubdiv-config-deps.cmake
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ compiler('cxx') }}
        - cmake
        - ninja
        - if: linux
          then:
            - gcc_linux-64 <15
            - gxx_linux-64 <15
      host:
        - tbb-devel >=2022.3,<2023
        - if: linux
          then:
            - glew
            - glfw
            - libegl-devel
            - libgl-devel
            - xorg-libx11
            - xorg-libxcursor
            - xorg-libxext
            - xorg-libxi
            - xorg-libxinerama
            - xorg-libxrandr
            - xorg-libxxf86vm
            - xorg-xorgproto
        - if: osx
          then:
            - glew
            - glfw

  - package:
      name: opensubdiv-lib
    inherit: opensubdiv-build
    build:
      files:
        - lib/libosdCPU.so*
        - lib/libosdCPU*.dylib*
        - Library/lib/osdCPU*.lib
    requirements:
      run_constraints:
        - opensubdiv-gpu-lib <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('opensubdiv-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/opensubdiv/version.h
              - lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake
              - lib/libosdCPU.a
              - lib/libosdGPU.so
              - lib/libosdGPU.dylib
              - Library/include/opensubdiv/version.h
              - Library/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake
              - Library/lib/osdGPU.lib
      - script:
          - if: linux
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libosdCPU.so*')); assert paths; ctypes.CDLL(paths[0])"
          - if: osx
            then:
              - python -c "import ctypes, glob, os; paths = glob.glob(os.path.join(os.environ['PREFIX'], 'lib', 'libosdCPU*.dylib*')); assert paths; ctypes.CDLL(paths[0])"
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\osdCPU.lib" exit /b 1
        requirements:
          run:
            - python

  - package:
      name: opensubdiv-dev
    inherit: opensubdiv-build
    build:
      files:
        - include/opensubdiv/**
        - lib/cmake/OpenSubdiv/**
        - lib/libosdCPU.a
        - Library/include/opensubdiv/**
        - Library/lib/cmake/OpenSubdiv/**
    requirements:
      run:
        - ${{ pin_subpackage('opensubdiv-lib', exact=True) }}
      run_constraints:
        - opensubdiv-gpu-dev <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('opensubdiv-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - opensubdiv/version.h
            - opensubdiv/osd/cpuEvaluator.h
          files:
            not_exists:
              - include/opensubdiv/osd/cudaEvaluator.h
              - include/opensubdiv/osd/mtlComputeEvaluator.h
              - include/opensubdiv/osd/glComputeEvaluator.h
              - Library/include/opensubdiv/osd/cudaEvaluator.h
              - Library/include/opensubdiv/osd/mtlComputeEvaluator.h
              - Library/include/opensubdiv/osd/glComputeEvaluator.h
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake"
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfigVersion.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DOPENSUBDIV_CONSUMER_EXPECT_CPU_ONLY=ON
              - cmake --build build
              - ctest --test-dir build --output-on-failure
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\OpenSubdiv\OpenSubdivConfig.cmake" exit /b 1
              - if not exist "%LIBRARY_LIB%\cmake\OpenSubdiv\OpenSubdivConfigVersion.cmake" exit /b 1
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%" -DOPENSUBDIV_CONSUMER_EXPECT_CPU_ONLY=ON
              - cmake --build build --config Release
              - ctest --test-dir build --output-on-failure
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/opensubdiv_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: opensubdiv
    requirements:
      run:
        - ${{ pin_subpackage('opensubdiv-lib', exact=True) }}
        - ${{ pin_subpackage('opensubdiv-dev', exact=True) }}
      run_constraints:
        - opensubdiv-gpu <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('opensubdiv-lib', upper_bound='x.x') }}
    tests:
      - script:
          - if: unix
            then:
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DOPENSUBDIV_CONSUMER_EXPECT_CPU_ONLY=ON
              - cmake --build build
              - ctest --test-dir build --output-on-failure
          - if: win
            then:
              - if not exist "%LIBRARY_LIB%\cmake\OpenSubdiv\OpenSubdivConfig.cmake" exit /b 1
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="%LIBRARY_PREFIX%" -DOPENSUBDIV_CONSUMER_EXPECT_CPU_ONLY=ON
              - cmake --build build --config Release
              - ctest --test-dir build --output-on-failure
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/opensubdiv_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: opensubdiv-gpu-lib
    inherit: opensubdiv-gpu-build
    build:
      skip:
        - win
      files:
        - lib/libosdCPU.so*
        - lib/libosdGPU.so*
        - lib/libosdCPU*.dylib*
        - lib/libosdGPU*.dylib*
    requirements:
      run:
        - tbb >=2022.3,<2023
      run_constraints:
        - opensubdiv-lib <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('opensubdiv-gpu-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          files:
            not_exists:
              - include/opensubdiv/version.h
              - lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake
              - lib/libosdCPU.a
              - lib/libosdGPU.a
      - script:
          - if: linux
            then:
              - test -e "$PREFIX/lib/libosdGPU.so"
              - python -c "import ctypes, glob, os; lib = os.path.join(os.environ['PREFIX'], 'lib'); [ctypes.CDLL(glob.glob(os.path.join(lib, pattern))[0]) for pattern in ('libosdCPU.so*', 'libosdGPU.so*')]"
          - if: osx
            then:
              - test -e "$PREFIX/lib/libosdGPU.dylib"
              - python -c "import ctypes, glob, os; lib = os.path.join(os.environ['PREFIX'], 'lib'); [ctypes.CDLL(glob.glob(os.path.join(lib, pattern))[0]) for pattern in ('libosdCPU*.dylib*', 'libosdGPU*.dylib*')]"
        requirements:
          run:
            - python

  - package:
      name: opensubdiv-gpu-dev
    inherit: opensubdiv-gpu-build
    build:
      skip:
        - win
      files:
        - include/opensubdiv/**
        - lib/cmake/OpenSubdiv/**
        - lib/libosdCPU.a
        - lib/libosdGPU.a
    requirements:
      run:
        - ${{ pin_subpackage('opensubdiv-gpu-lib', exact=True) }}
        - tbb-devel >=2022.3,<2023
        - if: linux
          then:
            - libgl-devel
      run_constraints:
        - opensubdiv-dev <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('opensubdiv-gpu-lib', upper_bound='x.x') }}
    tests:
      - package_contents:
          include:
            - opensubdiv/version.h
            - opensubdiv/osd/cpuEvaluator.h
            - opensubdiv/osd/glVertexBuffer.h
      - script:
          - if: linux
            then:
              - test ! -f "$PREFIX/include/opensubdiv/osd/cudaEvaluator.h"
              - test ! -f "$PREFIX/include/opensubdiv/osd/mtlComputeEvaluator.h"
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DOPENSUBDIV_CONSUMER_REQUIRE_GPU=ON -DOPENSUBDIV_CONSUMER_REQUIRE_OPENGL=ON -DOPENSUBDIV_CONSUMER_REQUIRE_TBB=ON -DOPENSUBDIV_CONSUMER_FORBID_CUDA=ON -DOPENSUBDIV_CONSUMER_FORBID_METAL=ON
              - cmake --build build
              - ctest --test-dir build --output-on-failure
          - if: osx
            then:
              - test -f "$PREFIX/include/opensubdiv/osd/mtlComputeEvaluator.h"
              - test ! -f "$PREFIX/include/opensubdiv/osd/cudaEvaluator.h"
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DOPENSUBDIV_CONSUMER_REQUIRE_GPU=ON -DOPENSUBDIV_CONSUMER_REQUIRE_METAL=ON -DOPENSUBDIV_CONSUMER_FORBID_CUDA=ON
              - cmake --build build
              - ctest --test-dir build --output-on-failure
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/opensubdiv_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

  - package:
      name: opensubdiv-gpu
    build:
      skip:
        - win
    requirements:
      run:
        - ${{ pin_subpackage('opensubdiv-gpu-lib', exact=True) }}
        - ${{ pin_subpackage('opensubdiv-gpu-dev', exact=True) }}
      run_constraints:
        - opensubdiv <0a0
      run_exports:
        weak:
          - ${{ pin_subpackage('opensubdiv-gpu-lib', upper_bound='x.x') }}
    tests:
      - script:
          - if: linux
            then:
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DOPENSUBDIV_CONSUMER_REQUIRE_GPU=ON -DOPENSUBDIV_CONSUMER_REQUIRE_OPENGL=ON -DOPENSUBDIV_CONSUMER_REQUIRE_TBB=ON -DOPENSUBDIV_CONSUMER_FORBID_CUDA=ON -DOPENSUBDIV_CONSUMER_FORBID_METAL=ON
              - cmake --build build
              - ctest --test-dir build --output-on-failure
          - if: osx
            then:
              - test -f "$PREFIX/lib/cmake/OpenSubdiv/OpenSubdivConfig.cmake"
              - cmake -S tests -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$PREFIX" -DOPENSUBDIV_CONSUMER_REQUIRE_GPU=ON -DOPENSUBDIV_CONSUMER_REQUIRE_METAL=ON -DOPENSUBDIV_CONSUMER_FORBID_CUDA=ON
              - cmake --build build
              - ctest --test-dir build --output-on-failure
        files:
          recipe:
            - tests/CMakeLists.txt
            - tests/opensubdiv_consumer.cpp
        requirements:
          run:
            - ${{ compiler('cxx') }}
            - cmake
            - ninja

about:
  homepage: https://github.com/PixarAnimationStudios/OpenSubdiv
  repository: https://github.com/PixarAnimationStudios/OpenSubdiv
  license: LicenseRef-TOSL-1.0
  license_file: LICENSE.txt
  summary: Open-source subdivision surface libraries
